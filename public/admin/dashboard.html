<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gebyanos — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0c0b09;
      --surface: #141210;
      --border:  #2a2620;
      --gold:    #c9a84c;
      --text:    #e8dcc8;
      --muted:   #6b6055;
      --font-serif: 'Playfair Display', serif;
      --font-mono:  'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
    }

    /* NAV */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .nav-logo {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }
    .nav-title {
      font-family: var(--font-serif);
      font-size: 1rem;
      letter-spacing: 0.02em;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-user {
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .nav-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      transition: color 200ms, border-color 200ms;
    }
    .nav-logout:hover { color: var(--text); border-color: var(--muted); }
    .nav-tabs { display: flex; gap: 0.25rem; }
    .nav-tab {
      color: var(--muted); text-decoration: none;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.35rem 0.875rem; border-radius: 4px;
      transition: color 200ms, background 200ms;
    }
    .nav-tab:hover { color: var(--text); background: var(--border); }
    .nav-tab.active { color: var(--gold); background: rgba(201,168,76,0.08); }
    @media (max-width: 540px) { .nav-tabs { display: none; } }

    /* MAIN */
    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* DATE NAV */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .date-label {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      flex: 1;
      text-transform: capitalize;
    }
    .date-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      transition: border-color 200ms;
    }
    .date-btn:hover { border-color: var(--muted); }
    .date-btn.today {
      color: var(--gold);
      border-color: var(--gold);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* FILTER BARBEROS */
    .filter-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 0.875rem;
      cursor: pointer;
      transition: all 200ms;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--muted); }
    .filter-btn.active { background: var(--gold); border-color: var(--gold); color: var(--bg); }

    /* RESERVAS */
    .count {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.875rem;
    }
    .reservas-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .reserva-row {
      display: grid;
      grid-template-columns: 60px 1fr 1fr auto;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.875rem 1.25rem;
      transition: border-color 200ms;
    }
    .reserva-row:hover { border-color: var(--muted); }
    .reserva-row.owner-view {
      grid-template-columns: 60px 1fr 1fr 100px;
    }
    .reserva-hora {
      font-size: 1rem;
      color: var(--gold);
      font-weight: 500;
    }
    .reserva-nombre {
      font-size: 0.95rem;
    }
    .reserva-servicio {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .reserva-barbero {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: right;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 3rem 0;
    }
    .loading {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 3rem 0;
    }

    @media (max-width: 500px) {
      .reserva-row, .reserva-row.owner-view {
        grid-template-columns: 50px 1fr;
        grid-template-rows: auto auto;
      }
      .reserva-servicio { grid-column: 2; }
      .reserva-barbero  { grid-column: 1 / -1; text-align: left; }
      .nav { padding: 0 1rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-brand">
      <img src="/img/logo.jpg" alt="Gebyanos" class="nav-logo">
      <span class="nav-title">Gebyanos</span>
    </div>
    <div class="nav-tabs">
      <a href="/admin/dashboard" class="nav-tab active">Reservas</a>
      <a href="/admin/agenda"    class="nav-tab">Agenda</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="nav-logout" id="logout-btn">Salir</button>
    </div>
  </nav>

  <main class="main">

    <div class="date-nav">
      <button class="date-btn" id="prev-btn">←</button>
      <span class="date-label" id="date-label"></span>
      <button class="date-btn" id="next-btn">→</button>
      <button class="date-btn today" id="today-btn">Hoy</button>
    </div>

    <div class="filter-row" id="filter-row" style="display:none">
      <button class="filter-btn active" data-v="todos">Todos</button>
      <button class="filter-btn" data-v="gebyano">Gebyano</button>
      <button class="filter-btn" data-v="lobo">Lobo</button>
      <button class="filter-btn" data-v="felipe">Felipe</button>
    </div>

    <div id="content"></div>

  </main>

  <script>
    let role         = null;
    let currentDate  = new Date();
    let filtro       = 'todos';

    // ── Auth ──────────────────────────────────────────────
    async function init() {
      const res = await fetch('/admin/api/me');
      if (!res.ok) { location.href = '/admin/'; return; }
      const { barbero_id, role: r } = await res.json();
      role = r;
      document.getElementById('nav-user').textContent = cap(barbero_id);
      if (role === 'owner') document.getElementById('filter-row').style.display = 'flex';
      await load();
    }

    // ── Data ──────────────────────────────────────────────
    async function load() {
      document.getElementById('date-label').textContent = formatLabel(currentDate);
      document.getElementById('content').innerHTML = '<div class="loading">Cargando...</div>';

      const params = new URLSearchParams({ fecha: formatFecha(currentDate) });
      if (filtro !== 'todos') params.set('barbero', filtro);

      const res = await fetch(`/admin/api/reservas?${params}`);
      if (!res.ok) { location.href = '/admin/'; return; }

      const { reservas } = await res.json();
      render(reservas);
    }

    function render(reservas) {
      const el = document.getElementById('content');

      if (!reservas.length) {
        el.innerHTML = '<p class="empty">Sin reservas para este día.</p>';
        return;
      }

      const isOwner = role === 'owner';
      const rows = reservas.map(r => {
        const hora = r.mensaje?.split(' ')[1] || '—';
        return `
          <div class="reserva-row ${isOwner ? 'owner-view' : ''}">
            <span class="reserva-hora">${hora}</span>
            <span class="reserva-nombre">${r.nombre}</span>
            <span class="reserva-servicio">${r.servicio}</span>
            ${isOwner ? `<span class="reserva-barbero">${r.barbero}</span>` : ''}
          </div>`;
      }).join('');

      el.innerHTML = `
        <p class="count">${reservas.length} turno${reservas.length !== 1 ? 's' : ''}</p>
        <div class="reservas-list">${rows}</div>`;
    }

    // ── Navegación de fecha ───────────────────────────────
    document.getElementById('prev-btn').addEventListener('click', () => {
      currentDate.setDate(currentDate.getDate() - 1);
      load();
    });
    document.getElementById('next-btn').addEventListener('click', () => {
      currentDate.setDate(currentDate.getDate() + 1);
      load();
    });
    document.getElementById('today-btn').addEventListener('click', () => {
      currentDate = new Date();
      load();
    });

    // ── Filtro barbero ────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtro = btn.dataset.v;
        load();
      });
    });

    // ── Logout ────────────────────────────────────────────
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/admin/api/auth', { method: 'DELETE' });
      location.href = '/admin/';
    });

    // ── Utils ─────────────────────────────────────────────
    function formatFecha(d) {
      return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
    }
    function formatLabel(d) {
      return d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    function cap(s) {
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    init();
  </script>

</body>
</html>
