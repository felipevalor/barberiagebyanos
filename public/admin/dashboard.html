<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gebyanos — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0c0b09;
      --surface: #141210;
      --border:  #2a2620;
      --gold:    #c9a84c;
      --text:    #e8dcc8;
      --muted:   #6b6055;
      --font-serif: 'Playfair Display', serif;
      --font-mono:  'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; }

    /* ── NAV ── */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 10;
      min-height: 64px;
    }
    .nav-brand { display: flex; align-items: center; gap: 0.75rem; }
    .nav-logo  { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; }
    .nav-title { font-family: var(--font-serif); font-size: 1rem; white-space: nowrap; }
    .nav-x     { color: var(--muted); font-size: 0.9rem; flex-shrink: 0; }
    .nav-vs    { height: 96px; opacity: 0.9; flex-shrink: 0; }

    .nav-tabs  { display: flex; gap: 0.25rem; }
    .nav-tab {
      color: var(--muted); text-decoration: none;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.5rem 1rem; border-radius: 4px;
      transition: color 200ms, background 200ms;
    }
    .nav-tab:hover  { color: var(--text); background: var(--border); }
    .nav-tab.active { color: var(--gold); background: rgba(201,168,76,0.08); }

    .nav-right  { display: flex; align-items: center; gap: 0.75rem; }
    .nav-user   { font-size: 0.8rem; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
    .nav-logout {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); font-family: var(--font-mono); font-size: 0.7rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.45rem 0.75rem; cursor: pointer; transition: color 200ms, border-color 200ms;
      white-space: nowrap;
    }
    .nav-logout:hover { color: var(--text); border-color: var(--muted); }

    /* ── MAIN ── */
    .main { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    /* ── DATE NAV ── */
    .date-nav {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .date-label { font-family: var(--font-serif); font-size: 1.2rem; flex: 1; text-transform: capitalize; }
    .date-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-mono); font-size: 0.9rem;
      padding: 0.5rem 0.875rem; cursor: pointer; transition: border-color 200ms;
      min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center;
    }
    .date-btn:hover { border-color: var(--muted); }
    .date-btn.today {
      color: var(--gold); border-color: var(--gold);
      font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* ── FILTER BARBEROS ── */
    .filter-row { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .filter-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.45rem 1rem; cursor: pointer; transition: all 200ms;
      min-height: 40px;
    }
    .filter-btn:hover  { color: var(--text); border-color: var(--muted); }
    .filter-btn.active { background: var(--gold); border-color: var(--gold); color: var(--bg); }

    /* ── RESERVAS ── */
    .count { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.75rem; }
    .reservas-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .reserva-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem 1.125rem; transition: border-color 200ms;
    }
    .reserva-card:hover { border-color: rgba(201,168,76,0.3); }
    .reserva-top { display: flex; align-items: center; gap: 0.875rem; margin-bottom: 0.3rem; }
    .reserva-hora    { font-size: 1.05rem; color: var(--gold); font-weight: 500; white-space: nowrap; }
    .reserva-nombre  { font-size: 0.95rem; font-weight: 500; }
    .reserva-bottom  { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .reserva-servicio { font-size: 0.8rem; color: var(--muted); }
    .reserva-barbero  { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

    .empty   { text-align: center; color: var(--muted); font-size: 0.9rem; padding: 3rem 0; }
    .loading { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 3rem 0; }

    /* ── RESPONSIVE ── */
    @media (max-width: 540px) {
      .nav-tabs  { display: none; }
      .nav-title { display: none; }
      .nav-vs    { height: 64px; }
      .nav-logo  { width: 36px; height: 36px; }
      .nav { padding: 0.5rem 1rem; }
      .date-label { font-size: 1rem; }
      .main { padding: 1.25rem 0.875rem 4rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-brand">
      <img src="/img/logo.jpg" alt="Gebyanos" class="nav-logo">
      <span class="nav-title">Gebyanos</span>
      <span class="nav-x">×</span>
      <img src="/img/Valor Solutions-blanca.png" alt="Valor Solutions" class="nav-vs">
    </div>
    <div class="nav-tabs">
      <a href="/admin/dashboard" class="nav-tab active">Reservas</a>
      <a href="/admin/agenda"    class="nav-tab">Agenda</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="nav-logout" id="logout-btn">Salir</button>
    </div>
  </nav>

  <main class="main">

    <div class="date-nav">
      <button class="date-btn" id="prev-btn">←</button>
      <span class="date-label" id="date-label"></span>
      <button class="date-btn" id="next-btn">→</button>
      <button class="date-btn today" id="today-btn">Hoy</button>
    </div>

    <div class="filter-row" id="filter-row" style="display:none">
      <button class="filter-btn active" data-v="todos">Todos</button>
      <button class="filter-btn" data-v="gebyano">Gebyano</button>
      <button class="filter-btn" data-v="lobo">Lobo</button>
      <button class="filter-btn" data-v="felipe">Felipe</button>
    </div>

    <div id="content"></div>

  </main>

  <script>
    let role        = null;
    let currentDate = new Date();
    let filtro      = 'todos';

    async function init() {
      const res = await fetch('/admin/api/me');
      if (!res.ok) { location.href = '/admin/'; return; }
      const { barbero_id, role: r } = await res.json();
      role = r;
      document.getElementById('nav-user').textContent = cap(barbero_id);
      if (role === 'owner') document.getElementById('filter-row').style.display = 'flex';
      await load();
    }

    async function load() {
      document.getElementById('date-label').textContent = formatLabel(currentDate);
      document.getElementById('content').innerHTML = '<div class="loading">Cargando...</div>';

      const params = new URLSearchParams({ fecha: formatFecha(currentDate) });
      if (filtro !== 'todos') params.set('barbero', filtro);

      const res = await fetch(`/admin/api/reservas?${params}`);
      if (!res.ok) { location.href = '/admin/'; return; }

      const { reservas } = await res.json();
      render(reservas);
    }

    function render(reservas) {
      const el = document.getElementById('content');
      if (!reservas.length) {
        el.innerHTML = '<p class="empty">Sin reservas para este día.</p>';
        return;
      }

      const isOwner = role === 'owner';
      const cards = reservas.map(r => {
        const hora = r.mensaje?.split(' ')[1] || '—';
        return `
          <div class="reserva-card">
            <div class="reserva-top">
              <span class="reserva-hora">${hora}</span>
              <span class="reserva-nombre">${r.nombre}</span>
            </div>
            <div class="reserva-bottom">
              <span class="reserva-servicio">${r.servicio}</span>
              ${isOwner ? `<span class="reserva-barbero">${r.barbero}</span>` : ''}
            </div>
          </div>`;
      }).join('');

      el.innerHTML = `
        <p class="count">${reservas.length} turno${reservas.length !== 1 ? 's' : ''}</p>
        <div class="reservas-list">${cards}</div>`;
    }

    document.getElementById('prev-btn').addEventListener('click', () => { currentDate.setDate(currentDate.getDate() - 1); load(); });
    document.getElementById('next-btn').addEventListener('click', () => { currentDate.setDate(currentDate.getDate() + 1); load(); });
    document.getElementById('today-btn').addEventListener('click', () => { currentDate = new Date(); load(); });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtro = btn.dataset.v;
        load();
      });
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/admin/api/auth', { method: 'DELETE' });
      location.href = '/admin/';
    });

    function formatFecha(d) { return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`; }
    function formatLabel(d) { return d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' }); }
    function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    init();
  </script>

</body>
</html>
