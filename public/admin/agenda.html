<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gebyanos — Agenda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0c0b09;
      --surface: #141210;
      --border:  #2a2620;
      --gold:    #c9a84c;
      --text:    #e8dcc8;
      --muted:   #6b6055;
      --red:     #e57373;
      --green:   #6dbf7e;
      --font-serif: 'Playfair Display', serif;
      --font-mono:  'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; }

    /* NAV */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 56px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-brand { display: flex; align-items: center; gap: 0.75rem; }
    .nav-logo  { width: 32px; height: 32px; border-radius: 50%; }
    .nav-title { font-family: var(--font-serif); font-size: 1rem; }
    .nav-tabs  { display: flex; gap: 0.25rem; }
    .nav-tab {
      color: var(--muted); text-decoration: none;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.35rem 0.875rem; border-radius: 4px;
      transition: color 200ms, background 200ms;
    }
    .nav-tab:hover  { color: var(--text); background: var(--border); }
    .nav-tab.active { color: var(--gold); background: rgba(201,168,76,0.08); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-user  { font-size: 0.8rem; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; }
    .nav-logout {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); font-family: var(--font-mono); font-size: 0.7rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.35rem 0.75rem; cursor: pointer; transition: color 200ms, border-color 200ms;
    }
    .nav-logout:hover { color: var(--text); border-color: var(--muted); }

    /* TOOLBAR */
    .toolbar {
      max-width: 720px; margin: 0 auto;
      padding: 1.75rem 1.5rem 0;
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
    }
    .date-label { font-family: var(--font-serif); font-size: 1.2rem; flex: 1; text-transform: capitalize; }
    .btn-icon {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-mono); font-size: 0.85rem;
      padding: 0.4rem 0.75rem; cursor: pointer; transition: border-color 200ms;
    }
    .btn-icon:hover { border-color: var(--muted); }
    .btn-today {
      color: var(--gold); border-color: var(--gold);
      font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .barbero-select {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-mono); font-size: 0.8rem;
      padding: 0.4rem 0.75rem; outline: none; cursor: pointer; transition: border-color 200ms;
      appearance: none;
    }
    .barbero-select:focus { border-color: var(--gold); }
    .barbero-select option { background: var(--surface); }

    /* MAIN */
    .main { max-width: 720px; margin: 0 auto; padding: 1.25rem 1.5rem 3rem; }

    /* SLOTS */
    .slots { display: flex; flex-direction: column; gap: 0.375rem; margin-top: 0.25rem; }

    .slot-row {
      display: grid;
      grid-template-columns: 58px 110px 1fr auto;
      align-items: center; gap: 1rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 1.125rem;
      cursor: pointer;
      transition: border-color 200ms, background 200ms;
    }
    .slot-row:hover       { border-color: var(--muted); background: #1a1814; }
    .slot-row.reservado   { border-color: rgba(201,168,76,0.25); }
    .slot-row.reservado:hover { border-color: rgba(201,168,76,0.5); }
    .slot-row.bloqueado   { opacity: 0.6; }
    .slot-row.bloqueado:hover { opacity: 0.9; border-color: var(--red); }
    .slot-row.ocupado     { opacity: 0.5; cursor: default; }
    .slot-row.ocupado:hover { border-color: var(--border); background: var(--surface); opacity: 0.5; }
    .slot-row.libre:hover { border-color: var(--green); }

    .slot-hora  { font-size: 0.95rem; font-weight: 500; color: var(--gold); }
    .slot-badge {
      font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.2rem 0.6rem; border-radius: 20px; border: 1px solid currentColor;
    }
    .badge-libre     { color: var(--green); }
    .badge-reservado { color: var(--gold); }
    .badge-bloqueado { color: var(--muted); }
    .badge-ocupado   { color: var(--muted); }

    .slot-info { font-size: 0.85rem; color: var(--text); }
    .slot-info .servicio { color: var(--muted); font-size: 0.78rem; margin-left: 0.5rem; }

    .slot-hint {
      font-size: 0.7rem; color: var(--muted); text-align: right; white-space: nowrap;
    }
    .slot-row.libre    .slot-hint { color: var(--green); opacity: 0.6; }
    .slot-row.bloqueado .slot-hint { color: var(--red); opacity: 0.6; }
    .no-cal-note { font-size: 0.7rem; color: var(--muted); text-align: right; white-space: nowrap; }

    .empty, .loading { text-align: center; color: var(--muted); font-size: 0.875rem; padding: 3rem 0; }

    /* MODAL */
    dialog {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-family: var(--font-mono);
      padding: 0; width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
    }
    dialog::backdrop { background: rgba(0,0,0,0.7); }
    .modal-header {
      padding: 1.25rem 1.5rem 0;
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .modal-title { font-family: var(--font-serif); font-size: 1.1rem; }
    .modal-subtitle { font-size: 0.75rem; color: var(--gold); margin-top: 0.2rem; }
    .modal-close {
      background: none; border: none; color: var(--muted); font-size: 1.2rem;
      cursor: pointer; padding: 0 0.25rem; line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field label { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .field input, .field select {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-mono); font-size: 0.9rem;
      padding: 0.6rem 0.875rem; outline: none; transition: border-color 200ms;
      width: 100%;
    }
    .field input:focus, .field select:focus { border-color: var(--gold); }
    .field select option { background: var(--surface); }
    .modal-confirm-text { font-size: 0.875rem; color: var(--muted); line-height: 1.5; }
    .modal-footer {
      padding: 0 1.5rem 1.5rem;
      display: flex; gap: 0.75rem; justify-content: flex-end;
    }
    .modal-footer.space-between { justify-content: space-between; }
    .btn {
      font-family: var(--font-mono); font-size: 0.75rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.5rem 1.125rem; border-radius: 6px; cursor: pointer;
      border: 1px solid; transition: all 200ms;
    }
    .btn-cancel  { background: none; border-color: var(--border); color: var(--muted); }
    .btn-cancel:hover { border-color: var(--muted); color: var(--text); }
    .btn-primary { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: 500; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-danger  { background: none; border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: rgba(229,115,115,0.1); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    @media (max-width: 540px) {
      .slot-row { grid-template-columns: 50px 90px 1fr; grid-template-rows: auto auto; }
      .slot-row > :last-child { grid-column: 1 / -1; }
      .nav-tabs { display: none; }
      dialog { margin: auto 1rem; max-width: calc(100% - 2rem); }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-brand">
      <img src="/img/logo.jpg" alt="Gebyanos" class="nav-logo">
      <span class="nav-title">Gebyanos</span>
    </div>
    <div class="nav-tabs">
      <a href="/admin/dashboard" class="nav-tab">Reservas</a>
      <a href="/admin/agenda"    class="nav-tab active">Agenda</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="nav-logout" id="logout-btn">Salir</button>
    </div>
  </nav>

  <div class="toolbar">
    <button class="btn-icon" id="prev-btn">←</button>
    <span class="date-label" id="date-label"></span>
    <button class="btn-icon" id="next-btn">→</button>
    <button class="btn-icon btn-today" id="today-btn">Hoy</button>
    <select class="barbero-select" id="barbero-select" style="display:none">
      <option value="gebyano">Gebyano</option>
      <option value="lobo">Lobo</option>
      <option value="felipe">Felipe</option>
    </select>
  </div>

  <main class="main">
    <div id="content"><div class="loading">Cargando...</div></div>
  </main>

  <!-- Modal único reutilizable -->
  <dialog id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </dialog>

  <script>
    const SERVICIOS = ['Corte', 'Corte + Barba', 'Barba', 'Afeitado', 'Niños'];

    let role           = null;
    let sessionBarbero = null;
    let currentDate    = new Date();
    let calendarConfig = false;
    let slotsData      = [];

    // ── Auth ──────────────────────────────────────────────
    async function init() {
      const res = await fetch('/admin/api/me');
      if (!res.ok) { location.href = '/admin/'; return; }
      const { barbero_id, role: r } = await res.json();
      role           = r;
      sessionBarbero = barbero_id;
      document.getElementById('nav-user').textContent = cap(barbero_id);

      const sel = document.getElementById('barbero-select');
      if (role === 'owner') { sel.style.display = 'block'; sel.value = 'gebyano'; }
      await load();
    }

    // ── Data ──────────────────────────────────────────────
    async function load() {
      document.getElementById('date-label').textContent = formatLabel(currentDate);
      document.getElementById('content').innerHTML = '<div class="loading">Cargando...</div>';

      const bId    = getSelectedBarbero();
      const fecha  = formatFecha(currentDate);
      const params = new URLSearchParams({ fecha, barbero: bId });

      const res = await fetch(`/admin/api/agenda?${params}`);
      if (!res.ok) { location.href = '/admin/'; return; }

      const data = await res.json();
      calendarConfig = data.calendarConfigured;
      slotsData      = data.slots || [];

      if (data.diaNoLaboral) {
        document.getElementById('content').innerHTML = '<p class="empty">Día no laborable.</p>';
        return;
      }
      render(slotsData, calendarConfig);
    }

    function render(slots, hasCalendar) {
      if (!slots.length) {
        document.getElementById('content').innerHTML = '<p class="empty">Sin turnos para este día.</p>';
        return;
      }

      const rows = slots.map(s => {
        let badge, info, hint;

        if (s.status === 'reservado') {
          badge = `<span class="slot-badge badge-reservado">Reservado</span>`;
          info  = `<span class="slot-info">${esc(s.nombre)}<span class="servicio">${esc(s.servicio)}</span></span>`;
          hint  = `<span class="slot-hint">Editar</span>`;
        } else if (s.status === 'ocupado') {
          badge = `<span class="slot-badge badge-ocupado">Ocupado</span>`;
          info  = `<span class="slot-info">${esc(s.nombre)}<span class="servicio">${esc(s.servicio)}</span></span>`;
          hint  = `<span class="slot-hint" style="opacity:0.4">↑ continúa</span>`;
        } else if (s.status === 'bloqueado') {
          badge = `<span class="slot-badge badge-bloqueado">Bloqueado</span>`;
          info  = `<span class="slot-info"></span>`;
          hint  = `<span class="slot-hint">Desbloquear</span>`;
        } else {
          badge = `<span class="slot-badge badge-libre">Disponible</span>`;
          info  = `<span class="slot-info"></span>`;
          if (hasCalendar) {
            hint = `<span class="slot-hint">+ Agregar</span>`;
          } else {
            hint = `<span class="no-cal-note" title="Sin calendario configurado">Sin cal.</span>`;
          }
        }

        return `
          <div class="slot-row ${s.status}" data-hora="${s.hora}" onclick="handleSlotClick('${s.hora}')">
            <span class="slot-hora">${s.hora}</span>
            ${badge}
            ${info}
            <div>${hint}</div>
          </div>`;
      }).join('');

      document.getElementById('content').innerHTML = `<div class="slots">${rows}</div>`;
    }

    // ── Slot click dispatcher ─────────────────────────────
    function handleSlotClick(hora) {
      const slot = slotsData.find(s => s.hora === hora);
      if (!slot) return;
      if (slot.status === 'libre')      openModalAgregar(slot);
      if (slot.status === 'reservado')  openModalEditar(slot);
      if (slot.status === 'bloqueado')  openModalDesbloquear(slot);
      // ocupado: no action (slot cubierto por servicio de otra hora)
    }

    // ── Modal: Agregar turno ──────────────────────────────
    function openModalAgregar(slot) {
      setModalHeader(`Agregar turno`, `${slot.hora} · ${formatLabel(currentDate)}`);

      document.getElementById('modal-body').innerHTML = `
        <div class="field">
          <label>Nombre del cliente</label>
          <input id="m-nombre" type="text" placeholder="Juan García" autocomplete="off">
        </div>
        <div class="field">
          <label>Servicio</label>
          <select id="m-servicio">
            ${SERVICIOS.map(s => `<option value="${s}">${s}</option>`).join('')}
          </select>
        </div>`;

      document.getElementById('modal-footer').className = 'modal-footer';
      document.getElementById('modal-footer').innerHTML = `
        <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" id="btn-confirm">Confirmar</button>`;

      document.getElementById('btn-confirm').onclick = () => confirmarAgregar(slot.hora);
      document.getElementById('m-nombre').addEventListener('keydown', e => { if (e.key === 'Enter') confirmarAgregar(slot.hora); });

      openModal();
      setTimeout(() => document.getElementById('m-nombre')?.focus(), 50);
    }

    async function confirmarAgregar(hora) {
      const nombre   = document.getElementById('m-nombre').value.trim();
      const servicio = document.getElementById('m-servicio').value;
      if (!nombre) { document.getElementById('m-nombre').focus(); return; }

      setBusy(true);
      const res = await fetch('/admin/api/turno', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          barbero_id: getSelectedBarbero(),
          fecha: formatFecha(currentDate),
          hora, nombre, servicio,
        }),
      });

      if (res.ok) {
        closeModal();
        await load();
      } else {
        const { error } = await res.json();
        alert(error || 'Error al guardar');
        setBusy(false);
      }
    }

    // ── Modal: Editar / Eliminar turno ───────────────────
    function openModalEditar(slot) {
      setModalHeader(`Turno ${slot.hora}`, formatLabel(currentDate));

      document.getElementById('modal-body').innerHTML = `
        <div class="field">
          <label>Nombre del cliente</label>
          <input id="m-nombre" type="text" value="${esc(slot.nombre)}" autocomplete="off">
        </div>
        <div class="field">
          <label>Servicio</label>
          <select id="m-servicio">
            ${SERVICIOS.map(s => `<option value="${s}" ${s === slot.servicio ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
        </div>`;

      document.getElementById('modal-footer').className = 'modal-footer space-between';
      document.getElementById('modal-footer').innerHTML = `
        <button class="btn btn-danger"  id="btn-eliminar">Eliminar</button>
        <div style="display:flex;gap:0.75rem">
          <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" id="btn-confirm">Guardar</button>
        </div>`;

      document.getElementById('btn-confirm').onclick  = () => confirmarEditar(slot.id);
      document.getElementById('btn-eliminar').onclick = () => confirmarEliminar(slot);

      openModal();
      setTimeout(() => {
        const el = document.getElementById('m-nombre');
        if (el) { el.focus(); el.select(); }
      }, 50);
    }

    async function confirmarEditar(id) {
      const nombre   = document.getElementById('m-nombre').value.trim();
      const servicio = document.getElementById('m-servicio').value;
      if (!nombre) { document.getElementById('m-nombre').focus(); return; }

      setBusy(true);
      const res = await fetch('/admin/api/turno', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, nombre, servicio }),
      });

      if (res.ok) {
        closeModal();
        await load();
      } else {
        const { error } = await res.json();
        alert(error || 'Error al guardar');
        setBusy(false);
      }
    }

    async function confirmarEliminar(slot) {
      // Cambiar modal a confirmación de eliminación
      setModalHeader(`Eliminar turno`, `${slot.hora} · ${esc(slot.nombre)}`);
      document.getElementById('modal-body').innerHTML = `
        <p class="modal-confirm-text">
          ¿Eliminar el turno de <strong>${esc(slot.nombre)}</strong> (${esc(slot.servicio)}) a las ${slot.hora}?<br>
          Esta acción no se puede deshacer.
        </p>`;
      document.getElementById('modal-footer').className = 'modal-footer';
      document.getElementById('modal-footer').innerHTML = `
        <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-danger" id="btn-confirm-delete">Eliminar</button>`;

      document.getElementById('btn-confirm-delete').onclick = async () => {
        setBusy(true);
        const res = await fetch('/admin/api/turno', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: slot.id }),
        });
        if (res.ok) {
          closeModal();
          await load();
        } else {
          const { error } = await res.json();
          alert(error || 'Error al eliminar');
          setBusy(false);
        }
      };
    }

    // ── Modal: Desbloquear ────────────────────────────────
    function openModalDesbloquear(slot) {
      if (!slot.calendarEventId) {
        alert('No se puede desbloquear: ID de evento no disponible.');
        return;
      }
      setModalHeader(`Slot bloqueado`, `${slot.hora} · ${formatLabel(currentDate)}`);
      document.getElementById('modal-body').innerHTML = `
        <p class="modal-confirm-text">¿Desbloquear este horario y dejarlo disponible?</p>`;
      document.getElementById('modal-footer').className = 'modal-footer';
      document.getElementById('modal-footer').innerHTML = `
        <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" id="btn-confirm">Desbloquear</button>`;

      document.getElementById('btn-confirm').onclick = async () => {
        setBusy(true);
        const res = await fetch('/admin/api/bloquear', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            barbero_id: getSelectedBarbero(),
            calendarEventId: slot.calendarEventId,
          }),
        });
        if (res.ok) {
          closeModal();
          await load();
        } else {
          const { error } = await res.json();
          alert(error || 'Error al desbloquear');
          setBusy(false);
        }
      };

      openModal();
    }

    // ── Modal helpers ─────────────────────────────────────
    function setModalHeader(title, subtitle) {
      document.getElementById('modal-title').textContent    = title;
      document.getElementById('modal-subtitle').textContent = subtitle;
    }
    function openModal()  { document.getElementById('modal').showModal(); }
    function closeModal() { document.getElementById('modal').close(); }
    function setBusy(busy) {
      document.querySelectorAll('#modal .btn').forEach(b => b.disabled = busy);
    }

    // ── Navegación ────────────────────────────────────────
    document.getElementById('prev-btn').addEventListener('click', () => { currentDate.setDate(currentDate.getDate() - 1); load(); });
    document.getElementById('next-btn').addEventListener('click', () => { currentDate.setDate(currentDate.getDate() + 1); load(); });
    document.getElementById('today-btn').addEventListener('click', () => { currentDate = new Date(); load(); });
    document.getElementById('barbero-select').addEventListener('change', load);
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

    // ── Logout ────────────────────────────────────────────
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/admin/api/auth', { method: 'DELETE' });
      location.href = '/admin/';
    });

    // ── Utils ─────────────────────────────────────────────
    function getSelectedBarbero() {
      return role === 'owner'
        ? document.getElementById('barbero-select').value
        : sessionBarbero;
    }
    function formatFecha(d)  { return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`; }
    function formatLabel(d)  { return d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' }); }
    function cap(s)          { return s.charAt(0).toUpperCase() + s.slice(1); }
    function esc(s)          { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    init();
  </script>

</body>
</html>
