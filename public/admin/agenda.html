<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gebyanos — Agenda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
  <style>
    /* ── TOOLBAR ── */
    .date-label {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      flex: 1;
      text-transform: capitalize;
      min-width: 0;
    }

    .btn-cal {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 200ms, color 200ms;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-cal:hover,
    .btn-cal.open {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── CALENDAR POPUP ── */
    .cal-popup {
      display: none;
      position: fixed;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      width: 272px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      font-family: var(--font-mono);
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .cal-month-lbl {
      font-family: var(--font-serif);
      font-size: 0.95rem;
      color: var(--text);
    }

    .cal-nav {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: color 150ms, border-color 150ms;
    }

    .cal-nav:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cal-dow {
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.25rem 0 0.5rem;
    }

    .cal-day {
      text-align: center;
      padding: 0.3rem 0;
      font-size: 0.78rem;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 120ms, color 120ms;
      color: var(--text);
    }

    .cal-day:hover {
      background: var(--border);
    }

    .cal-day.other {
      color: var(--muted);
      opacity: 0.35;
    }

    .cal-day.is-today {
      border-color: rgba(201, 168, 76, 0.5);
      color: var(--gold);
    }

    .cal-day.is-selected {
      background: var(--gold);
      color: var(--bg);
      font-weight: 600;
      border-color: transparent;
    }

    .cal-day.is-selected:hover {
      background: var(--gold);
    }

    .cal-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .cal-hoy-btn {
      background: none;
      border: none;
      color: var(--gold);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      transition: opacity 150ms;
    }

    .cal-hoy-btn:hover {
      opacity: 0.7;
    }

    .btn-icon {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 0.5rem 0.875rem;
      cursor: pointer;
      transition: border-color 200ms;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon:hover {
      border-color: var(--muted);
    }

    .btn-today {
      color: var(--gold);
      border-color: var(--gold);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .barbero-select {
      font-size: 0.8rem;
    }

    /* ── MAIN ── */
    .main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem 1rem 4rem;
    }

    /* ── SLOTS ── */
    .slots {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      margin-top: 0.25rem;
    }

    .slot-row {
      display: grid;
      grid-template-columns: 54px 100px 1fr auto;
      align-items: center;
      gap: 0.875rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.875rem 1rem;
      cursor: pointer;
      transition: border-color 200ms, background 200ms;
      min-height: 56px;
    }

    .slot-row:hover {
      border-color: var(--muted);
      background: #1a1814;
    }

    .slot-row.reservado {
      border-color: rgba(201, 168, 76, 0.25);
    }

    .slot-row.reservado:hover {
      border-color: rgba(201, 168, 76, 0.5);
    }

    .slot-row.bloqueado {
      opacity: 0.6;
    }

    .slot-row.bloqueado:hover {
      opacity: 0.9;
      border-color: var(--red);
    }

    .slot-row.ocupado {
      opacity: 0.5;
      cursor: default;
    }

    .slot-row.ocupado:hover {
      border-color: var(--border);
      background: var(--surface);
      opacity: 0.5;
    }

    .slot-row.libre:hover {
      border-color: var(--green);
    }

    .slot-hora {
      font-size: 1rem;
      font-weight: 500;
      color: var(--gold);
    }

    .slot-badge {
      font-size: 0.68rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      border: 1px solid currentColor;
      white-space: nowrap;
    }

    .badge-libre {
      color: var(--green);
    }

    .badge-reservado {
      color: var(--gold);
    }

    .badge-bloqueado {
      color: var(--muted);
    }

    .badge-ocupado {
      color: var(--muted);
    }

    .slot-info {
      font-size: 0.85rem;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .slot-info .servicio {
      color: var(--muted);
      font-size: 0.78rem;
      margin-left: 0.4rem;
    }

    .slot-hint {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .slot-row.libre .slot-hint {
      color: var(--green);
      opacity: 0.7;
    }

    .slot-row.bloqueado .slot-hint {
      color: var(--red);
      opacity: 0.7;
    }

    .no-cal-note {
      font-size: 0.68rem;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    /* ── AUTOCOMPLETE ── */
    .ac-wrap {
      position: relative;
    }

    .ac-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 200;
      background: var(--surface);
      border: 1px solid var(--gold);
      border-radius: 8px;
      overflow: hidden;
      margin-top: 2px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    .ac-item {
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-size: 0.875rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: background 100ms;
    }

    .ac-item:last-child {
      border-bottom: none;
    }

    .ac-item:hover {
      background: var(--border);
    }

    .ac-tel {
      color: var(--muted);
      font-size: 0.75rem;
    }

    /* ── DAY / SLOT PICKERS (modales) ── */
    .edit-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .edit-day-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.6rem;
      padding: 0.3rem 0.1rem;
      cursor: pointer;
      text-align: center;
      transition: border-color 150ms;
      line-height: 1.4;
    }

    .edit-day-btn:hover {
      border-color: var(--muted);
    }

    .edit-day-btn.selected {
      border-color: var(--gold);
      color: var(--gold);
    }

    .edit-slots {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
    }

    .edit-slot-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      padding: 0.45rem 0.1rem;
      cursor: pointer;
      text-align: center;
      transition: border-color 150ms;
    }

    .edit-slot-btn:hover:not(:disabled) {
      border-color: var(--muted);
    }

    .edit-slot-btn.selected {
      border-color: var(--gold);
      color: var(--gold);
    }

    .edit-slot-btn:disabled {
      opacity: 0.28;
      cursor: default;
    }

    .edit-loading {
      font-size: 0.78rem;
      color: var(--muted);
      padding: 0.5rem 0;
    }

    @media (max-width: 540px) {
      .slot-row {
        grid-template-columns: 48px 88px 1fr;
        grid-template-rows: auto auto;
        gap: 0.5rem 0.75rem;
        padding: 0.875rem;
      }

      .slot-row> :last-child {
        grid-column: 1 / -1;
        justify-self: start;
      }

      .main {
        padding: 0.875rem 0.875rem 5.5rem;
      }
    }
  </style>
</head>

<body>
  <div id="nav-placeholder"></div>

  <div class="toolbar">
    <button class="btn-icon" id="prev-btn">←</button>
    <span class="date-label" id="date-label"></span>
    <button class="btn-cal" id="btn-cal" title="Elegir fecha">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <line x1="16" y1="2" x2="16" y2="6" />
        <line x1="8" y1="2" x2="8" y2="6" />
        <line x1="3" y1="10" x2="21" y2="10" />
      </svg>
    </button>
    <button class="btn-icon" id="next-btn">→</button>
    <button class="btn-icon btn-today" id="today-btn">Hoy</button>
    <select class="barbero-select" id="barbero-select" style="display:none">
      <option value="gebyano">Gebyano</option>
      <option value="lobo">Lobo</option>
      <option value="felipe">Felipe</option>
    </select>
  </div>

  <main class="main">
    <div id="content">
      <div class="loading">Cargando...</div>
    </div>
  </main>

  <!-- Modal único reutilizable -->
  <dialog id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </dialog>

  <script>
    const SERVICIOS = ['Corte', 'Corte + Barba', 'Barba', 'Afeitado', 'Niños'];
    const BARBEROS = [
      { id: 'gebyano', nombre: 'Gebyano' },
      { id: 'lobo', nombre: 'Lobo' },
      { id: 'felipe', nombre: 'Felipe' },
    ];
    const DIAS_ABR = ['Do', 'Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sá'];
    const DEFAULT_SCHEDULE = { 1: { start: 9, end: 20 }, 2: { start: 9, end: 20 }, 3: { start: 9, end: 20 }, 4: { start: 9, end: 20 }, 5: { start: 9, end: 20 }, 6: { start: 9, end: 17 } };

    let role = null;
    let sessionBarbero = null;
    let currentDate = new Date();
    let calendarConfig = false;
    let slotsData = [];

    async function init() {
      const res = await fetch('/admin/api/me');
      if (!res.ok) { location.href = '/admin/'; return; }
      const { barbero_id, role: r } = await res.json();
      role = r;
      sessionBarbero = barbero_id;
      document.getElementById('nav-user').textContent = cap(barbero_id);

      const sel = document.getElementById('barbero-select');
      if (role === 'owner') {
        sel.style.display = 'block'; sel.value = sessionBarbero;
        document.querySelector('.nav-tab-owner')?.style.removeProperty('display');
        document.querySelector('.bottom-nav-owner')?.style.removeProperty('display');
      }

      // Pre-fill from recurrentes redirect (?fecha=D/M/Y&pre_nombre=X&pre_servicio=Y&pre_hora=HH:MM)
      const qp = new URLSearchParams(location.search);
      if (qp.has('fecha')) {
        const [d, m, y] = qp.get('fecha').split('/').map(Number);
        if (d && m && y) currentDate = new Date(y, m - 1, d);
      }
      await load();
      if (qp.has('pre_hora')) {
        const hora = qp.get('pre_hora');
        const slot = slotsData.find(s => s.hora === hora && s.status === 'libre');
        if (slot) {
          openModalAgregar(slot, qp.get('pre_nombre') || '', qp.get('pre_servicio') || '');
        }
      }
    }

    async function load() {
      // Actualizar label y sincronizar el picker oculto
      document.getElementById('date-label').textContent = formatLabel(currentDate);
      document.getElementById('content').innerHTML = '<div class="loading">Cargando...</div>';

      const bId = getSelectedBarbero();
      const fecha = formatFecha(currentDate);
      const params = new URLSearchParams({ fecha, barbero: bId });

      const res = await fetch(`/admin/api/agenda?${params}`);
      if (!res.ok) { location.href = '/admin/'; return; }

      const data = await res.json();
      calendarConfig = data.calendarConfigured;
      slotsData = data.slots || [];

      if (data.diaNoLaboral) {
        document.getElementById('content').innerHTML = '<p class="empty">Día no laborable.</p>';
        return;
      }
      render(slotsData, calendarConfig);
    }

    function render(slots, hasCalendar) {
      if (!slots.length) {
        document.getElementById('content').innerHTML = '<p class="empty">Sin turnos para este día.</p>';
        return;
      }

      const rows = slots.map(s => {
        let badge, info, hint;

        if (s.status === 'reservado') {
          badge = `<span class="slot-badge badge-reservado">Reservado</span>`;
          info = `<span class="slot-info">${esc(s.nombre)}<span class="servicio">${esc(s.servicio)}</span></span>`;
          hint = `<span class="slot-hint">Editar</span>`;
        } else if (s.status === 'ocupado') {
          badge = `<span class="slot-badge badge-ocupado">Ocupado</span>`;
          info = `<span class="slot-info">${esc(s.nombre)}<span class="servicio">${esc(s.servicio)}</span></span>`;
          hint = `<span class="slot-hint" style="opacity:0.4">↑ continúa</span>`;
        } else if (s.status === 'bloqueado') {
          badge = `<span class="slot-badge badge-bloqueado">Bloqueado</span>`;
          info = `<span class="slot-info"></span>`;
          hint = `<span class="slot-hint">Desbloquear</span>`;
        } else {
          badge = `<span class="slot-badge badge-libre">Disponible</span>`;
          info = `<span class="slot-info"></span>`;
          hint = hasCalendar
            ? `<span class="slot-hint">+ Agregar</span>`
            : `<span class="no-cal-note">Sin cal.</span>`;
        }

        return `
          <div class="slot-row ${s.status}" data-hora="${s.hora}" onclick="handleSlotClick('${s.hora}')">
            <span class="slot-hora">${s.hora}</span>
            ${badge}
            ${info}
            <div>${hint}</div>
          </div>`;
      }).join('');

      document.getElementById('content').innerHTML = `<div class="slots">${rows}</div>`;
    }

    // ── Slot click dispatcher ─────────────────────────────
    function handleSlotClick(hora) {
      const slot = slotsData.find(s => s.hora === hora);
      if (!slot) return;
      if (slot.status === 'libre') openModalAgregar(slot);
      if (slot.status === 'reservado') openModalEditar(slot);   // async, no await needed
      if (slot.status === 'bloqueado') openModalDesbloquear(slot);
    }

    // ── Helpers compartidos para modales con selector de día/hora ────────────
    // Usado tanto en "Agregar turno" como en "Editar turno".

    function buildDayChips(containerEl, schedule, selectedFecha, onDayClick) {
      containerEl.innerHTML = '';
      const today = new Date();
      for (let i = 0; i < 14; i++) {
        const d = new Date(today); d.setDate(today.getDate() + i);
        if (!schedule[d.getDay()]) continue;
        const fechaStr = formatFecha(d);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'edit-day-btn' + (fechaStr === selectedFecha ? ' selected' : '');
        btn.innerHTML = `${DIAS_ABR[d.getDay()]}<br><strong>${d.getDate()}</strong>`;
        btn.addEventListener('click', () => {
          containerEl.querySelectorAll('.edit-day-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          onDayClick(fechaStr);
        });
        containerEl.appendChild(btn);
      }
    }

    // currentSlot: { hora, fecha, barberoId } del turno que se está editando,
    // para que su propio horario no aparezca como ocupado.
    async function buildSlotChips(containerEl, { barberoId, fecha, selectedHora, schedule, onSelect, currentSlot = null }) {
      containerEl.innerHTML = '<span class="edit-loading">Cargando...</span>';

      const barberoNombre = BARBEROS.find(b => b.id === barberoId)?.nombre || barberoId;
      let occupied = [];
      try {
        const r = await fetch(`/api/turnos?barbero=${encodeURIComponent(barberoNombre)}&fecha=${encodeURIComponent(fecha)}&barberoId=${barberoId}`);
        if (r.ok) ({ occupied } = await r.json());
      } catch { }

      const [dd, mm, yy] = fecha.split('/').map(Number);
      const dow = new Date(yy, mm - 1, dd).getDay();
      const daySchedule = schedule[dow];
      containerEl.innerHTML = '';

      if (!daySchedule) {
        containerEl.innerHTML = '<span class="edit-loading">Día no laborable.</span>';
        return;
      }

      const SLOT_DUR = 30;
      const now = new Date();
      for (let h = daySchedule.start; h < daySchedule.end; h++) {
        for (let m = 0; m < 60; m += SLOT_DUR) {
          const timeStr = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
          const slotStart = h * 60 + m;
          const slotEnd = slotStart + SLOT_DUR;
          const slotDate = new Date(yy, mm - 1, dd, h, m);

          const isCurrentSlot = currentSlot &&
            timeStr === currentSlot.hora &&
            fecha === currentSlot.fecha &&
            barberoId === currentSlot.barberoId;

          const isBusy = !isCurrentSlot && (
            slotDate < now ||
            occupied.some(b => {
              const [bh, bm] = b.hora.split(':').map(Number);
              const bStart = bh * 60 + bm;
              return slotStart < bStart + b.duracion && slotEnd > bStart;
            })
          );

          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'edit-slot-btn' + (timeStr === selectedHora ? ' selected' : '');
          btn.textContent = timeStr;
          btn.disabled = isBusy;
          if (!isBusy) {
            btn.addEventListener('click', () => {
              containerEl.querySelectorAll('.edit-slot-btn').forEach(b => b.classList.remove('selected'));
              btn.classList.add('selected');
              onSelect(timeStr);
            });
          }
          containerEl.appendChild(btn);
        }
      }
    }

    // ── Modal: Agregar turno ──────────────────────────────
    async function openModalAgregar(slot, preNombre = '', preServicio = '') {
      const initBarberoId = getSelectedBarbero();
      setModalHeader('Agregar turno', formatLabel(currentDate));

      const barberoOpts = BARBEROS.map(b =>
        `<option value="${b.id}"${b.id === initBarberoId ? ' selected' : ''}>${b.nombre}</option>`
      ).join('');

      document.getElementById('modal-body').innerHTML = `
        ${role === 'owner' ? `
        <div class="field">
          <label>Barbero</label>
          <select id="m-barbero">${barberoOpts}</select>
        </div>` : ''}
        <div class="field">
          <label>Nombre del cliente</label>
          <div class="ac-wrap">
            <input id="m-nombre" type="text" placeholder="Juan García" autocomplete="off" value="${preNombre.replace(/"/g, '&quot;')}">
          </div>
        </div>
        <div class="field">
          <label>Celular <span style="opacity:0.5;font-size:0.65rem">(opcional)</span></label>
          <input id="m-tel" type="tel" placeholder="3415551234" autocomplete="off">
        </div>
        <div class="field">
          <label>Servicio</label>
          <select id="m-servicio">
            ${SERVICIOS.map(s => `<option value="${s}"${s === preServicio ? ' selected' : ''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Fecha</label>
          <div id="m-edit-days" class="edit-days"><span class="edit-loading">Cargando...</span></div>
        </div>
        <div class="field">
          <label>Hora</label>
          <div id="m-edit-slots" class="edit-slots"><span class="edit-loading">—</span></div>
        </div>`;

      document.getElementById('modal-footer').className = 'modal-footer';
      document.getElementById('modal-footer').innerHTML = `
        <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" id="btn-confirm">Confirmar</button>`;
      openModal();
      setTimeout(() => document.getElementById('m-nombre')?.focus(), 50);

      let addBarberoId = initBarberoId;
      let addFecha = formatFecha(currentDate);
      let addHora = slot.hora;
      let cachedSchedule = null;

      async function loadSchedule() {
        try {
          const r = await fetch(`/api/horarios?barbero=${addBarberoId}`);
          cachedSchedule = r.ok ? await r.json() : { ...DEFAULT_SCHEDULE };
        } catch { cachedSchedule = { ...DEFAULT_SCHEDULE }; }
      }

      function renderDays() {
        const daysEl = document.getElementById('m-edit-days');
        if (!daysEl) return;
        buildDayChips(daysEl, cachedSchedule, addFecha, async (fecha) => {
          addFecha = fecha; addHora = null; await renderSlots();
        });
      }

      async function renderSlots() {
        const slotsEl = document.getElementById('m-edit-slots');
        if (!slotsEl) return;
        await buildSlotChips(slotsEl, {
          barberoId: addBarberoId, fecha: addFecha, selectedHora: addHora,
          schedule: cachedSchedule, onSelect: (h) => { addHora = h; },
        });
      }

      if (role === 'owner') {
        document.getElementById('m-barbero').addEventListener('change', async e => {
          addBarberoId = e.target.value;
          addHora = null;
          await loadSchedule();
          renderDays();
          await renderSlots();
        });
      }

      document.getElementById('btn-confirm').onclick = () => confirmarAgregar(addBarberoId, addFecha, addHora);
      initAutocomplete('m-nombre', 'm-tel');

      await loadSchedule();
      renderDays();
      await renderSlots();
    }

    async function confirmarAgregar(barberoId, fecha, hora) {
      const nombre = document.getElementById('m-nombre').value.trim();
      const tel = document.getElementById('m-tel')?.value.trim().replace(/[\s\-().+]/g, '') || '';
      const servicio = document.getElementById('m-servicio').value;
      if (!nombre) { document.getElementById('m-nombre').focus(); return; }
      if (!hora) { showToast('Elegí un horario', { variant: 'error' }); return; }
      setBusy(true);
      const res = await fetch('/admin/api/turno', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ barbero_id: barberoId, fecha, hora, nombre, servicio, telefono: tel }),
      });
      if (res.ok) { closeModal(); await load(); }
      else { const { error } = await res.json(); showToast(error || 'Error al guardar', { variant: 'error' }); setBusy(false); }
    }

    // ── Modal: Editar / Eliminar turno ───────────────────
    async function openModalEditar(slot) {
      const slotBarberoId = getSelectedBarbero();
      setModalHeader(`Turno ${slot.hora}`, formatLabel(currentDate));

      const barberoOpts = BARBEROS.map(b =>
        `<option value="${b.id}"${b.id === slotBarberoId ? ' selected' : ''}>${b.nombre}</option>`
      ).join('');

      document.getElementById('modal-body').innerHTML = `
        ${role === 'owner' ? `
        <div class="field">
          <label>Barbero</label>
          <select id="m-barbero">${barberoOpts}</select>
        </div>` : ''}
        <div class="field">
          <label>Nombre del cliente</label>
          <div class="ac-wrap">
            <input id="m-nombre" type="text" value="${esc(slot.nombre)}" autocomplete="off">
          </div>
        </div>
        <div class="field">
          <label>Celular <span style="opacity:0.5;font-size:0.65rem">(opcional)</span></label>
          <input id="m-tel" type="tel" placeholder="3415551234" autocomplete="off">
        </div>
        <div class="field">
          <label>Servicio</label>
          <select id="m-servicio">
            ${SERVICIOS.map(s => `<option value="${s}"${s === slot.servicio ? ' selected' : ''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Fecha</label>
          <div id="m-edit-days" class="edit-days"><span class="edit-loading">Cargando...</span></div>
        </div>
        <div class="field">
          <label>Hora</label>
          <div id="m-edit-slots" class="edit-slots"><span class="edit-loading">—</span></div>
        </div>`;

      document.getElementById('modal-footer').className = 'modal-footer space-between';
      document.getElementById('modal-footer').innerHTML = `
        <button class="btn btn-danger" id="btn-eliminar">Eliminar</button>
        <div style="display:flex;gap:0.75rem">
          <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" id="btn-confirm">Guardar</button>
        </div>`;
      document.getElementById('btn-eliminar').onclick = () => confirmarEliminar(slot);
      openModal();
      setTimeout(() => { const el = document.getElementById('m-nombre'); if (el) { el.focus(); el.select(); } }, 50);

      let editBarberoId = slotBarberoId;
      let editFecha = formatFecha(currentDate);
      let editHora = slot.hora;
      let cachedSchedule = null;

      async function loadSchedule() {
        try {
          const r = await fetch(`/api/horarios?barbero=${editBarberoId}`);
          cachedSchedule = r.ok ? await r.json() : { ...DEFAULT_SCHEDULE };
        } catch { cachedSchedule = { ...DEFAULT_SCHEDULE }; }
      }

      function renderDays() {
        const daysEl = document.getElementById('m-edit-days');
        if (!daysEl) return;
        buildDayChips(daysEl, cachedSchedule, editFecha, async (fecha) => {
          editFecha = fecha; editHora = null; await renderSlots();
        });
      }

      async function renderSlots() {
        const slotsEl = document.getElementById('m-edit-slots');
        if (!slotsEl) return;
        await buildSlotChips(slotsEl, {
          barberoId: editBarberoId, fecha: editFecha, selectedHora: editHora,
          schedule: cachedSchedule, onSelect: (h) => { editHora = h; },
          currentSlot: { hora: slot.hora, fecha: formatFecha(currentDate), barberoId: slotBarberoId },
        });
      }

      if (role === 'owner') {
        document.getElementById('m-barbero').addEventListener('change', async e => {
          editBarberoId = e.target.value;
          editHora = null;
          await loadSchedule();
          renderDays();
          await renderSlots();
        });
      }

      document.getElementById('btn-confirm').onclick = () => confirmarEditar(slot.id, editBarberoId, editFecha, editHora);
      initAutocomplete('m-nombre', 'm-tel');

      await loadSchedule();
      renderDays();
      await renderSlots();
    }

    async function confirmarEditar(id, editBarberoId, editFecha, editHora) {
      const nombre = document.getElementById('m-nombre').value.trim();
      const tel = document.getElementById('m-tel')?.value.trim().replace(/[\s\-().+]/g, '') || '';
      const servicio = document.getElementById('m-servicio').value;
      if (!nombre) { document.getElementById('m-nombre').focus(); return; }
      if (!editHora) { showToast('Elegí un horario', { variant: 'error' }); return; }
      setBusy(true);
      const res = await fetch('/admin/api/turno', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, nombre, servicio, telefono: tel, nuevo_barbero_id: editBarberoId, nueva_fecha: editFecha, nueva_hora: editHora }),
      });
      if (res.ok) { closeModal(); await load(); }
      else { const { error } = await res.json(); showToast(error || 'Error al guardar', { variant: 'error' }); setBusy(false); }
    }

    async function confirmarEliminar(slot) {
      setModalHeader('Eliminar turno', `${slot.hora} · ${esc(slot.nombre)}`);
      document.getElementById('modal-body').innerHTML = `
        <p class="modal-confirm-text">
          ¿Eliminar el turno de <strong>${esc(slot.nombre)}</strong> (${esc(slot.servicio)}) a las ${slot.hora}?<br>
          Esta acción no se puede deshacer.
        </p>`;
      document.getElementById('modal-footer').className = 'modal-footer';
      document.getElementById('modal-footer').innerHTML = `
        <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-danger" id="btn-confirm-delete">Eliminar</button>`;
      document.getElementById('btn-confirm-delete').onclick = async () => {
        setBusy(true);
        const res = await fetch('/admin/api/turno', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: slot.id }),
        });
        if (res.ok) { closeModal(); await load(); }
        else { const { error } = await res.json(); showToast(error || 'Error al eliminar', { variant: 'error' }); setBusy(false); }
      };
    }

    // ── Modal: Desbloquear ────────────────────────────────
    function openModalDesbloquear(slot) {
      if (!slot.calendarEventId) { showToast('No se puede desbloquear: ID de evento no disponible', { variant: 'error' }); return; }
      setModalHeader('Slot bloqueado', `${slot.hora} · ${formatLabel(currentDate)}`);
      document.getElementById('modal-body').innerHTML = `
        <p class="modal-confirm-text">¿Desbloquear este horario y dejarlo disponible?</p>`;
      document.getElementById('modal-footer').className = 'modal-footer';
      document.getElementById('modal-footer').innerHTML = `
        <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" id="btn-confirm">Desbloquear</button>`;
      document.getElementById('btn-confirm').onclick = async () => {
        setBusy(true);
        const res = await fetch('/admin/api/bloquear', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ barbero_id: getSelectedBarbero(), calendarEventId: slot.calendarEventId }),
        });
        if (res.ok) { closeModal(); await load(); }
        else { const { error } = await res.json(); showToast(error || 'Error al desbloquear', { variant: 'error' }); setBusy(false); }
      };
      openModal();
    }

    // ── Modal helpers ─────────────────────────────────────
    function setModalHeader(title, subtitle) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-subtitle').textContent = subtitle;
    }
    function openModal() { document.getElementById('modal').showModal(); }
    function closeModal() { document.getElementById('modal').close(); }
    function setBusy(busy) { document.querySelectorAll('#modal .btn').forEach(b => b.disabled = busy); }

    // ── Navegación ────────────────────────────────────────
    document.getElementById('prev-btn').addEventListener('click', () => { currentDate.setDate(currentDate.getDate() - 1); load(); });
    document.getElementById('next-btn').addEventListener('click', () => { currentDate.setDate(currentDate.getDate() + 1); load(); });
    document.getElementById('today-btn').addEventListener('click', () => { currentDate = new Date(); load(); });
    document.getElementById('barbero-select').addEventListener('change', load);

    // ── Calendar Picker ───────────────────────────────────────────────────────
    const MESES = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
    let calOpen = false, calY = 0, calM = 0;

    function openCal() {
      if (calOpen) { closeCal(); return; }
      calY = currentDate.getFullYear(); calM = currentDate.getMonth();
      renderCal();
      const btn = document.getElementById('btn-cal');
      const rect = btn.getBoundingClientRect();
      const popup = document.getElementById('cal-popup');
      popup.style.top = (rect.bottom + 6) + 'px';
      popup.style.left = Math.max(8, rect.right - 272) + 'px';
      popup.style.display = 'block';
      btn.classList.add('open');
      calOpen = true;
    }
    function closeCal() {
      document.getElementById('cal-popup').style.display = 'none';
      document.getElementById('btn-cal').classList.remove('open');
      calOpen = false;
    }
    function renderCal() {
      const today = new Date();
      const first = new Date(calY, calM, 1);
      const lastD = new Date(calY, calM + 1, 0).getDate();
      const offset = first.getDay() === 0 ? 6 : first.getDay() - 1;
      const cells = [];
      for (let i = offset - 1; i >= 0; i--) cells.push({ d: new Date(calY, calM, -i), other: true });
      for (let i = 1; i <= lastD; i++)       cells.push({ d: new Date(calY, calM, i), other: false });
      while (cells.length % 7) cells.push({ d: new Date(calY, calM + 1, cells.length - lastD - offset + 1), other: true });

      const same = (a, b) => a.getDate() === b.getDate() && a.getMonth() === b.getMonth() && a.getFullYear() === b.getFullYear();
      document.getElementById('cal-popup').innerHTML = `
        <div class="cal-header">
          <button class="cal-nav" id="cal-prev">←</button>
          <span class="cal-month-lbl">${MESES[calM]} ${calY}</span>
          <button class="cal-nav" id="cal-next">→</button>
        </div>
        <div class="cal-grid">
          ${['L', 'M', 'M', 'J', 'V', 'S', 'D'].map(d => `<div class="cal-dow">${d}</div>`).join('')}
          ${cells.map(({ d, other }) => `<div class="cal-day${other ? ' other' : ''}${!other && same(d, today) && !same(d, currentDate) ? ' is-today' : ''}${same(d, currentDate) ? ' is-selected' : ''}" data-ts="${d.getTime()}">${d.getDate()}</div>`).join('')}
        </div>
        <div class="cal-footer"><button class="cal-hoy-btn" id="cal-hoy">Hoy</button></div>`;

      document.getElementById('cal-prev').onclick = e => { e.stopPropagation(); calM--; if (calM < 0) { calM = 11; calY--; } renderCal(); };
      document.getElementById('cal-next').onclick = e => { e.stopPropagation(); calM++; if (calM > 11) { calM = 0; calY++; } renderCal(); };
      document.getElementById('cal-hoy').onclick = e => { e.stopPropagation(); currentDate = new Date(); closeCal(); load(); };
      document.querySelectorAll('#cal-popup .cal-day').forEach(el => {
        el.onclick = e => { e.stopPropagation(); currentDate = new Date(Number(el.dataset.ts)); closeCal(); load(); };
      });
    }
    document.getElementById('btn-cal').addEventListener('click', e => { e.stopPropagation(); openCal(); });
    document.addEventListener('click', () => { if (calOpen) closeCal(); });
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });


    // ── Autocomplete clientes ─────────────────────────────
    function initAutocomplete(nombreId, telId) {
      const input = document.getElementById(nombreId);
      const telEl = document.getElementById(telId);
      if (!input) return;
      let dropEl = null, timer = null;

      function close() { dropEl?.remove(); dropEl = null; }

      input.addEventListener('input', () => {
        clearTimeout(timer);
        const q = input.value.trim();
        if (q.length < 2) { close(); return; }
        timer = setTimeout(async () => {
          const res = await fetch(`/admin/api/clientes?q=${encodeURIComponent(q)}&limit=6`);
          if (!res.ok) return;
          const { clientes } = await res.json();
          close();
          if (!clientes.length) return;
          dropEl = document.createElement('div');
          dropEl.className = 'ac-list';
          clientes.forEach(c => {
            const item = document.createElement('div');
            item.className = 'ac-item';
            item.innerHTML = `<span>${esc(c.nombre)}</span><span class="ac-tel">${c.telefono || ''}</span>`;
            item.addEventListener('mousedown', e => {
              e.preventDefault();
              input.value = c.nombre;
              if (telEl) telEl.value = c.telefono || '';
              close();
            });
            dropEl.appendChild(item);
          });
          input.closest('.ac-wrap').appendChild(dropEl);
        }, 300);
      });

      input.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
      document.addEventListener('click', e => {
        if (!input.closest('.ac-wrap')?.contains(e.target)) close();
      }, { capture: true });
    }

    // ── Utils ─────────────────────────────────────────────
    function getSelectedBarbero() {
      return role === 'owner' ? document.getElementById('barbero-select').value : sessionBarbero;
    }
    function formatFecha(d) { return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`; }
    function formatLabel(d) { return d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' }); }
    function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    init();

    // ── Nav compartido ──────────────────────────────────────────────────────
    (function () {
      const path = location.pathname.replace(/\/$/, '');
      fetch('/admin/_nav.html').then(r => r.text()).then(html => {
        document.getElementById('nav-placeholder').innerHTML = html;
        document.querySelector(`.nav-tab[href="${path}"]`)?.classList.add('active');
        const bLink = document.querySelector(`.bottom-nav a[href="${path}"]`);
        if (bLink) bLink.classList.add('active');
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/admin/api/auth', { method: 'DELETE' });
          location.href = '/admin/';
        });
      });
    })();
  </script>
