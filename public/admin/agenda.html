<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gebyanos — Agenda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0c0b09;
      --surface: #141210;
      --border:  #2a2620;
      --gold:    #c9a84c;
      --text:    #e8dcc8;
      --muted:   #6b6055;
      --red:     #e57373;
      --green:   #6dbf7e;
      --font-serif: 'Playfair Display', serif;
      --font-mono:  'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; }

    /* ── NAV ── */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 10;
      min-height: 64px;
    }
    .nav-brand { display: flex; align-items: center; gap: 0.75rem; }
    .nav-logo  { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; }
    .nav-title { font-family: var(--font-serif); font-size: 1rem; white-space: nowrap; }
    .nav-x     { color: var(--muted); font-size: 0.9rem; flex-shrink: 0; }
    .nav-vs    { height: 96px; opacity: 0.9; flex-shrink: 0; }

    .nav-tabs  { display: flex; gap: 0.25rem; }
    .nav-tab {
      color: var(--muted); text-decoration: none;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.5rem 1rem; border-radius: 4px;
      transition: color 200ms, background 200ms;
    }
    .nav-tab:hover  { color: var(--text); background: var(--border); }
    .nav-tab.active { color: var(--gold); background: rgba(201,168,76,0.08); }

    .nav-right { display: flex; align-items: center; gap: 0.75rem; }
    .nav-user  { font-size: 0.8rem; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
    .nav-logout {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); font-family: var(--font-mono); font-size: 0.7rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.45rem 0.75rem; cursor: pointer; transition: color 200ms, border-color 200ms;
      white-space: nowrap;
    }
    .nav-logout:hover { color: var(--text); border-color: var(--muted); }

    /* ── TOOLBAR ── */
    .toolbar {
      max-width: 720px; margin: 0 auto;
      padding: 1.25rem 1rem 0;
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }
    .date-label { font-family: var(--font-serif); font-size: 1.1rem; flex: 1; text-transform: capitalize; min-width: 0; }
    .btn-cal {
      flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); cursor: pointer; transition: border-color 200ms, color 200ms;
      min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center;
    }
    .btn-cal:hover, .btn-cal.open { border-color: var(--gold); color: var(--gold); }
    /* ── CALENDAR POPUP ── */
    .cal-popup {
      display: none; position: fixed; z-index: 300;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 1rem; width: 272px; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      font-family: var(--font-mono);
    }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .cal-month-lbl { font-family: var(--font-serif); font-size: 0.95rem; color: var(--text); }
    .cal-nav {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); cursor: pointer; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; transition: color 150ms, border-color 150ms;
    }
    .cal-nav:hover { color: var(--text); border-color: var(--muted); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-dow {
      text-align: center; font-size: 0.6rem; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--muted); padding: 0.25rem 0 0.5rem;
    }
    .cal-day {
      text-align: center; padding: 0.3rem 0; font-size: 0.78rem;
      border-radius: 6px; border: 1px solid transparent;
      cursor: pointer; transition: background 120ms, color 120ms; color: var(--text);
    }
    .cal-day:hover { background: var(--border); }
    .cal-day.other { color: var(--muted); opacity: 0.35; }
    .cal-day.is-today { border-color: rgba(201,168,76,0.5); color: var(--gold); }
    .cal-day.is-selected { background: var(--gold); color: var(--bg); font-weight: 600; border-color: transparent; }
    .cal-day.is-selected:hover { background: var(--gold); }
    .cal-footer { display: flex; justify-content: flex-end; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
    .cal-hoy-btn {
      background: none; border: none; color: var(--gold);
      font-family: var(--font-mono); font-size: 0.72rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; padding: 0.25rem 0.5rem; transition: opacity 150ms;
    }
    .cal-hoy-btn:hover { opacity: 0.7; }
    .btn-icon {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-mono); font-size: 0.9rem;
      padding: 0.5rem 0.875rem; cursor: pointer; transition: border-color 200ms;
      min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center;
    }
    .btn-icon:hover { border-color: var(--muted); }
    .btn-today {
      color: var(--gold); border-color: var(--gold);
      font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .barbero-select {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-mono); font-size: 0.8rem;
      padding: 0.5rem 0.875rem; outline: none; cursor: pointer; transition: border-color 200ms;
      appearance: none; min-height: 44px;
    }
    .barbero-select:focus { border-color: var(--gold); }
    .barbero-select option { background: var(--surface); }

    /* ── MAIN ── */
    .main { max-width: 720px; margin: 0 auto; padding: 1rem 1rem 4rem; }

    /* ── SLOTS ── */
    .slots { display: flex; flex-direction: column; gap: 0.375rem; margin-top: 0.25rem; }

    .slot-row {
      display: grid;
      grid-template-columns: 54px 100px 1fr auto;
      align-items: center; gap: 0.875rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.875rem 1rem;
      cursor: pointer;
      transition: border-color 200ms, background 200ms;
      min-height: 56px;
    }
    .slot-row:hover        { border-color: var(--muted); background: #1a1814; }
    .slot-row.reservado    { border-color: rgba(201,168,76,0.25); }
    .slot-row.reservado:hover { border-color: rgba(201,168,76,0.5); }
    .slot-row.bloqueado    { opacity: 0.6; }
    .slot-row.bloqueado:hover { opacity: 0.9; border-color: var(--red); }
    .slot-row.ocupado      { opacity: 0.5; cursor: default; }
    .slot-row.ocupado:hover { border-color: var(--border); background: var(--surface); opacity: 0.5; }
    .slot-row.libre:hover  { border-color: var(--green); }

    .slot-hora  { font-size: 1rem; font-weight: 500; color: var(--gold); }
    .slot-badge {
      font-size: 0.68rem; letter-spacing: 0.07em; text-transform: uppercase;
      padding: 0.25rem 0.6rem; border-radius: 20px; border: 1px solid currentColor;
      white-space: nowrap;
    }
    .badge-libre     { color: var(--green); }
    .badge-reservado { color: var(--gold); }
    .badge-bloqueado { color: var(--muted); }
    .badge-ocupado   { color: var(--muted); }

    .slot-info { font-size: 0.85rem; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .slot-info .servicio { color: var(--muted); font-size: 0.78rem; margin-left: 0.4rem; }

    .slot-hint { font-size: 0.7rem; color: var(--muted); text-align: right; white-space: nowrap; }
    .slot-row.libre    .slot-hint { color: var(--green); opacity: 0.7; }
    .slot-row.bloqueado .slot-hint { color: var(--red); opacity: 0.7; }
    .no-cal-note { font-size: 0.68rem; color: var(--muted); text-align: right; white-space: nowrap; }

    .empty, .loading { text-align: center; color: var(--muted); font-size: 0.875rem; padding: 3rem 0; }

    /* ── MODAL ── */
    dialog {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      color: var(--text); font-family: var(--font-mono);
      padding: 0; width: calc(100% - 2rem); max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      max-height: 90vh; overflow-y: auto;
    }
    dialog::backdrop { background: rgba(0,0,0,0.75); }

    /* ── Autocomplete ── */
    .ac-wrap { position: relative; }
    .ac-list {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
      background: var(--surface); border: 1px solid var(--gold);
      border-radius: 8px; overflow: hidden; margin-top: 2px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .ac-item {
      padding: 0.6rem 1rem; cursor: pointer; font-size: 0.875rem;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); transition: background 100ms;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover { background: var(--border); }
    .ac-tel { color: var(--muted); font-size: 0.75rem; }

    /* ── Edit day/slot pickers ── */
    .edit-days {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
    }
    .edit-day-btn {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-mono); font-size: 0.6rem;
      padding: 0.3rem 0.1rem; cursor: pointer; text-align: center;
      transition: border-color 150ms; line-height: 1.4;
    }
    .edit-day-btn:hover { border-color: var(--muted); }
    .edit-day-btn.selected { border-color: var(--gold); color: var(--gold); }
    .edit-slots {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px;
    }
    .edit-slot-btn {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-mono); font-size: 0.72rem;
      padding: 0.45rem 0.1rem; cursor: pointer; text-align: center;
      transition: border-color 150ms;
    }
    .edit-slot-btn:hover:not(:disabled) { border-color: var(--muted); }
    .edit-slot-btn.selected { border-color: var(--gold); color: var(--gold); }
    .edit-slot-btn:disabled { opacity: 0.28; cursor: default; }
    .edit-loading { font-size: 0.78rem; color: var(--muted); padding: 0.5rem 0; }
    .modal-header {
      padding: 1.25rem 1.25rem 0;
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .modal-title    { font-family: var(--font-serif); font-size: 1.1rem; }
    .modal-subtitle { font-size: 0.75rem; color: var(--gold); margin-top: 0.25rem; }
    .modal-close {
      background: none; border: none; color: var(--muted); font-size: 1.2rem;
      cursor: pointer; padding: 0 0.25rem; line-height: 1; flex-shrink: 0;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field label { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .field input, .field select {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: var(--font-mono); font-size: 1rem;
      padding: 0.75rem 1rem; outline: none; transition: border-color 200ms;
      width: 100%; min-height: 48px;
    }
    .field input:focus, .field select:focus { border-color: var(--gold); }
    .field select option { background: var(--surface); }
    .modal-confirm-text { font-size: 0.9rem; color: var(--muted); line-height: 1.6; }
    .modal-footer {
      padding: 0 1.25rem 1.25rem;
      display: flex; gap: 0.75rem; justify-content: flex-end;
    }
    .modal-footer.space-between { justify-content: space-between; }
    .btn {
      font-family: var(--font-mono); font-size: 0.75rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.625rem 1.25rem; border-radius: 8px; cursor: pointer;
      border: 1px solid; transition: all 200ms;
      min-height: 44px; display: flex; align-items: center;
    }
    .btn-cancel  { background: none; border-color: var(--border); color: var(--muted); }
    .btn-cancel:hover { border-color: var(--muted); color: var(--text); }
    .btn-primary { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: 500; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-danger  { background: none; border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: rgba(229,115,115,0.1); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    /* ── BOTTOM NAV (mobile) ── */
    .bottom-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      z-index: 20;
    }
    .bottom-nav a {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 0.25rem; padding: 0.75rem 0.5rem 0.875rem;
      text-decoration: none; color: var(--muted);
      font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
      transition: color 200ms;
    }
    .bottom-nav a.active { color: var(--gold); }
    .bottom-nav a svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }

    /* ── RESPONSIVE ── */
    @media (max-width: 540px) {
      .nav-tabs  { display: none; }
      .nav-title { display: none; }
      .nav-vs    { height: 64px; }
      .nav-logo  { width: 36px; height: 36px; }
      .nav { padding: 0.5rem 1rem; }

      .slot-row {
        grid-template-columns: 48px 88px 1fr;
        grid-template-rows: auto auto;
        gap: 0.5rem 0.75rem;
        padding: 0.875rem;
      }
      .slot-row > :last-child { grid-column: 1 / -1; justify-self: start; }

      .toolbar { padding: 1rem 0.875rem 0; }
      .main    { padding: 0.875rem 0.875rem 5.5rem; }
      .bottom-nav { display: flex; }
    }
    .admin-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.875rem 1.5rem; margin-top: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem; color: var(--muted);
    }
    .admin-footer-credit { display: flex; align-items: center; gap: 0.5rem; }
    .admin-footer-credit a { display: inline-flex; align-items: center; opacity: 0.7; transition: opacity 200ms; }
    .admin-footer-credit a:hover { opacity: 1; }
    .admin-footer-credit img { height: 140px; width: auto; }
    @media (max-width: 540px) {
      .admin-footer { flex-direction: column; gap: 0.75rem; text-align: center; padding: 1.25rem 1rem; }
      .admin-footer-credit { flex-direction: column; gap: 0.375rem; }
    }
  </style>
</head>

    <button class="btn-cal" id="btn-cal" title="Elegir fecha">

  <main class="main">

  <!-- Modal único reutilizable -->
  <dialog id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </dialog>

  <script>
    const SERVICIOS = ['Corte', 'Corte + Barba', 'Barba', 'Afeitado', 'Niños'];
    const BARBEROS  = [
      { id: 'gebyano', nombre: 'Gebyano' },
      { id: 'lobo',    nombre: 'Lobo' },
      { id: 'felipe',  nombre: 'Felipe' },
    ];
    const DIAS_ABR  = ['Do','Lu','Ma','Mi','Ju','Vi','Sá'];
    const DEFAULT_SCHEDULE = { 1:{start:9,end:20}, 2:{start:9,end:20}, 3:{start:9,end:20}, 4:{start:9,end:20}, 5:{start:9,end:20}, 6:{start:9,end:17} };

    let role           = null;
    let sessionBarbero = null;
    let currentDate    = new Date();
    let calendarConfig = false;
    let slotsData      = [];

    async function init() {
      const res = await fetch('/admin/api/me');
      if (!res.ok) { location.href = '/admin/'; return; }
      const { barbero_id, role: r } = await res.json();
      role           = r;
      sessionBarbero = barbero_id;
      document.getElementById('nav-user').textContent = cap(barbero_id);

      const sel = document.getElementById('barbero-select');
      if (role === 'owner') {
        sel.style.display = 'block'; sel.value = sessionBarbero || 'gebyano';
        document.querySelector('.nav-tab-owner')?.style.removeProperty('display');
        document.querySelector('.bottom-nav-owner')?.style.removeProperty('display');
      }

      // Pre-fill from recurrentes redirect (?fecha=D/M/Y&pre_nombre=X&pre_servicio=Y&pre_hora=HH:MM)
      const qp = new URLSearchParams(location.search);
      if (qp.has('fecha')) {
        const [d, m, y] = qp.get('fecha').split('/').map(Number);
        if (d && m && y) currentDate = new Date(y, m - 1, d);
      }
      await load();
      if (qp.has('pre_hora')) {
        const hora = qp.get('pre_hora');
        const slot = slotsData.find(s => s.hora === hora && s.status === 'libre');
        if (slot) {
          openModalAgregar(slot, qp.get('pre_nombre') || '', qp.get('pre_servicio') || '');
        }
      }
    }

    async function load() {
      // Actualizar label y sincronizar el picker oculto
      document.getElementById('date-label').textContent = formatLabel(currentDate);
      document.getElementById('content').innerHTML = '<div class="loading">Cargando...</div>';

      const bId    = getSelectedBarbero();
      const fecha  = formatFecha(currentDate);
      const params = new URLSearchParams({ fecha, barbero: bId });

      const res = await fetch(`/admin/api/agenda?${params}`);
      if (!res.ok) { location.href = '/admin/'; return; }

      const data = await res.json();
      calendarConfig = data.calendarConfigured;
      slotsData      = data.slots || [];

      if (data.diaNoLaboral) {
        document.getElementById('content').innerHTML = '<p class="empty">Día no laborable.</p>';
        return;
      }
      render(slotsData, calendarConfig);
    }

    function render(slots, hasCalendar) {
      if (!slots.length) {
        document.getElementById('content').innerHTML = '<p class="empty">Sin turnos para este día.</p>';
        return;
      }

      const rows = slots.map(s => {
        let badge, info, hint;

        if (s.status === 'reservado') {
          badge = `<span class="slot-badge badge-reservado">Reservado</span>`;
          info  = `<span class="slot-info">${esc(s.nombre)}<span class="servicio">${esc(s.servicio)}</span></span>`;
          hint  = `<span class="slot-hint">Editar</span>`;
        } else if (s.status === 'ocupado') {
          badge = `<span class="slot-badge badge-ocupado">Ocupado</span>`;
          info  = `<span class="slot-info">${esc(s.nombre)}<span class="servicio">${esc(s.servicio)}</span></span>`;
          hint  = `<span class="slot-hint" style="opacity:0.4">↑ continúa</span>`;
        } else if (s.status === 'bloqueado') {
          badge = `<span class="slot-badge badge-bloqueado">Bloqueado</span>`;
          info  = `<span class="slot-info"></span>`;
          hint  = `<span class="slot-hint">Desbloquear</span>`;
        } else {
          badge = `<span class="slot-badge badge-libre">Disponible</span>`;
          info  = `<span class="slot-info"></span>`;
          hint  = hasCalendar
            ? `<span class="slot-hint">+ Agregar</span>`
            : `<span class="no-cal-note">Sin cal.</span>`;
        }

        return `
          <div class="slot-row ${s.status}" data-hora="${s.hora}" onclick="handleSlotClick('${s.hora}')">
            <span class="slot-hora">${s.hora}</span>
            ${badge}
            ${info}
            <div>${hint}</div>
          </div>`;
      }).join('');

      document.getElementById('content').innerHTML = `<div class="slots">${rows}</div>`;
    }

    // ── Slot click dispatcher ─────────────────────────────
    function handleSlotClick(hora) {
      const slot = slotsData.find(s => s.hora === hora);
      if (!slot) return;
      if (slot.status === 'libre')     openModalAgregar(slot);
      if (slot.status === 'reservado') openModalEditar(slot);   // async, no await needed
      if (slot.status === 'bloqueado') openModalDesbloquear(slot);
    }

    // ── Modal: Agregar turno ──────────────────────────────
    async function openModalAgregar(slot, preNombre = '', preServicio = '') {
      const initBarberoId = getSelectedBarbero();
      setModalHeader('Agregar turno', formatLabel(currentDate));

      const barberoOpts = BARBEROS.map(b =>
        `<option value="${b.id}"${b.id === initBarberoId ? ' selected' : ''}>${b.nombre}</option>`
      ).join('');

      document.getElementById('modal-body').innerHTML = `
        ${role === 'owner' ? `
        <div class="field">
          <label>Barbero</label>
          <select id="m-barbero">${barberoOpts}</select>
        </div>` : ''}
        <div class="field">
          <label>Nombre del cliente</label>
          <div class="ac-wrap">
            <input id="m-nombre" type="text" placeholder="Juan García" autocomplete="off" value="${preNombre.replace(/"/g, '&quot;')}">
          </div>
        </div>
        <div class="field">
          <label>Celular <span style="opacity:0.5;font-size:0.65rem">(opcional)</span></label>
          <input id="m-tel" type="tel" placeholder="3415551234" autocomplete="off">
        </div>
        <div class="field">
          <label>Servicio</label>
          <select id="m-servicio">
            ${SERVICIOS.map(s => `<option value="${s}"${s === preServicio ? ' selected' : ''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Fecha</label>
          <div id="m-edit-days" class="edit-days"><span class="edit-loading">Cargando...</span></div>
        </div>
        <div class="field">
          <label>Hora</label>
          <div id="m-edit-slots" class="edit-slots"><span class="edit-loading">—</span></div>
        </div>`;

      document.getElementById('modal-footer').className = 'modal-footer';
      document.getElementById('modal-footer').innerHTML = `
        <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" id="btn-confirm">Confirmar</button>`;
      openModal();
      setTimeout(() => document.getElementById('m-nombre')?.focus(), 50);

      let addBarberoId  = initBarberoId;
      let addFecha      = formatFecha(currentDate);
      let addHora       = slot.hora;
      let cachedSchedule = null;

      async function loadSchedule() {
        try {
          const r = await fetch(`/api/horarios?barbero=${addBarberoId}`);
          cachedSchedule = r.ok ? await r.json() : { ...DEFAULT_SCHEDULE };
        } catch { cachedSchedule = { ...DEFAULT_SCHEDULE }; }
      }

      function renderDays() {
        const daysEl = document.getElementById('m-edit-days');
        if (!daysEl) return;
        daysEl.innerHTML = '';
        const today = new Date();
        for (let i = 0; i < 14; i++) {
          const d = new Date(today); d.setDate(today.getDate() + i);
          if (!cachedSchedule[d.getDay()]) continue;
          const fechaStr = formatFecha(d);
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'edit-day-btn' + (fechaStr === addFecha ? ' selected' : '');
          btn.innerHTML = `${DIAS_ABR[d.getDay()]}<br><strong>${d.getDate()}</strong>`;
          btn.addEventListener('click', async () => {
            daysEl.querySelectorAll('.edit-day-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            addFecha = fechaStr;
            addHora  = null;
            await renderSlots();
          });
          daysEl.appendChild(btn);
        }
      }

      async function renderSlots() {
        const slotsEl = document.getElementById('m-edit-slots');
        if (!slotsEl) return;
        slotsEl.innerHTML = '<span class="edit-loading">Cargando...</span>';

        const barberoNombre = BARBEROS.find(b => b.id === addBarberoId)?.nombre || addBarberoId;
        let occupied = [];
        try {
          const r = await fetch(`/api/turnos?barbero=${encodeURIComponent(barberoNombre)}&fecha=${encodeURIComponent(addFecha)}&barberoId=${addBarberoId}`);
          if (r.ok) ({ occupied } = await r.json());
        } catch {}

        const [dd, mm, yy] = addFecha.split('/').map(Number);
        const dow = new Date(yy, mm - 1, dd).getDay();
        const daySchedule = cachedSchedule[dow];
        slotsEl.innerHTML = '';

        if (!daySchedule) {
          slotsEl.innerHTML = '<span class="edit-loading">Día no laborable.</span>';
          return;
        }

        const SLOT_DUR = 30;
        const now = new Date();
        for (let h = daySchedule.start; h < daySchedule.end; h++) {
          for (let m = 0; m < 60; m += SLOT_DUR) {
            const timeStr   = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
            const slotStart = h * 60 + m;
            const slotEnd   = slotStart + SLOT_DUR;
            const slotDate  = new Date(yy, mm - 1, dd, h, m);

            const isBusy = slotDate < now || occupied.some(b => {
              const [bh, bm] = b.hora.split(':').map(Number);
              const bStart = bh * 60 + bm;
              return slotStart < bStart + b.duracion && slotEnd > bStart;
            });

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'edit-slot-btn' + (timeStr === addHora ? ' selected' : '');
            btn.textContent = timeStr;
            btn.disabled = isBusy;
            if (!isBusy) {
              btn.addEventListener('click', () => {
                slotsEl.querySelectorAll('.edit-slot-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                addHora = timeStr;
              });
            }
            slotsEl.appendChild(btn);
          }
        }
      }

      if (role === 'owner') {
        document.getElementById('m-barbero').addEventListener('change', async e => {
          addBarberoId = e.target.value;
          addHora = null;
          await loadSchedule();
          renderDays();
          await renderSlots();
        });
      }

      document.getElementById('btn-confirm').onclick = () => confirmarAgregar(addBarberoId, addFecha, addHora);
      initAutocomplete('m-nombre', 'm-tel');

      await loadSchedule();
      renderDays();
      await renderSlots();
    }

    // ── Modal helpers ─────────────────────────────────────
    function setModalHeader(title, subtitle) {
      document.getElementById('modal-title').textContent    = title;
      document.getElementById('modal-subtitle').textContent = subtitle;
    }
    function openModal()  { document.getElementById('modal').showModal(); }
    function closeModal() { document.getElementById('modal').close(); }
    function setBusy(busy) { document.querySelectorAll('#modal .btn').forEach(b => b.disabled = busy); }

    // ── Navegación ────────────────────────────────────────
    document.getElementById('prev-btn').addEventListener('click', () => { currentDate.setDate(currentDate.getDate() - 1); load(); });
    document.getElementById('next-btn').addEventListener('click', () => { currentDate.setDate(currentDate.getDate() + 1); load(); });
    document.getElementById('today-btn').addEventListener('click', () => { currentDate = new Date(); load(); });
    document.getElementById('barbero-select').addEventListener('change', load);

    // ── Calendar Picker ───────────────────────────────────────────────────────
    const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    let calOpen = false, calY = 0, calM = 0;

    function openCal() {
      if (calOpen) { closeCal(); return; }
      calY = currentDate.getFullYear(); calM = currentDate.getMonth();
      renderCal();
      const btn = document.getElementById('btn-cal');
      const rect = btn.getBoundingClientRect();
      const popup = document.getElementById('cal-popup');
      popup.style.top  = (rect.bottom + 6) + 'px';
      popup.style.left = Math.max(8, rect.right - 272) + 'px';
      popup.style.display = 'block';
      btn.classList.add('open');
      calOpen = true;
    }
    function closeCal() {
      document.getElementById('cal-popup').style.display = 'none';
      document.getElementById('btn-cal').classList.remove('open');
      calOpen = false;
    }
    function renderCal() {
      const today = new Date();
      const first = new Date(calY, calM, 1);
      const lastD = new Date(calY, calM + 1, 0).getDate();
      const offset = first.getDay() === 0 ? 6 : first.getDay() - 1;
      const cells = [];
      for (let i = offset - 1; i >= 0; i--) cells.push({ d: new Date(calY, calM, -i), other: true });
      for (let i = 1; i <= lastD; i++)       cells.push({ d: new Date(calY, calM, i), other: false });
      while (cells.length % 7) cells.push({ d: new Date(calY, calM + 1, cells.length - lastD - offset + 1), other: true });

      const same = (a, b) => a.getDate()===b.getDate() && a.getMonth()===b.getMonth() && a.getFullYear()===b.getFullYear();
      document.getElementById('cal-popup').innerHTML = `
        <div class="cal-header">
          <button class="cal-nav" id="cal-prev">←</button>
          <span class="cal-month-lbl">${MESES[calM]} ${calY}</span>
          <button class="cal-nav" id="cal-next">→</button>
        </div>
        <div class="cal-grid">
          ${['L','M','M','J','V','S','D'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
          ${cells.map(({d,other})=>`<div class="cal-day${other?' other':''}${!other&&same(d,today)&&!same(d,currentDate)?' is-today':''}${same(d,currentDate)?' is-selected':''}" data-ts="${d.getTime()}">${d.getDate()}</div>`).join('')}
        </div>
        <div class="cal-footer"><button class="cal-hoy-btn" id="cal-hoy">Hoy</button></div>`;

      document.getElementById('cal-prev').onclick = e => { e.stopPropagation(); calM--; if(calM<0){calM=11;calY--;} renderCal(); };
      document.getElementById('cal-next').onclick = e => { e.stopPropagation(); calM++; if(calM>11){calM=0;calY++;} renderCal(); };
      document.getElementById('cal-hoy').onclick  = e => { e.stopPropagation(); currentDate = new Date(); closeCal(); load(); };
      document.querySelectorAll('#cal-popup .cal-day').forEach(el => {
        el.onclick = e => { e.stopPropagation(); currentDate = new Date(Number(el.dataset.ts)); closeCal(); load(); };
      });
    }
    document.getElementById('btn-cal').addEventListener('click', e => { e.stopPropagation(); openCal(); });
    document.addEventListener('click', () => { if (calOpen) closeCal(); });
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/admin/api/auth', { method: 'DELETE' });
      location.href = '/admin/';
    });

    // ── Autocomplete clientes ─────────────────────────────
    function initAutocomplete(nombreId, telId) {
      const input  = document.getElementById(nombreId);
      const telEl  = document.getElementById(telId);
      if (!input) return;
      let dropEl = null, timer = null;

      function close() { dropEl?.remove(); dropEl = null; }

      input.addEventListener('input', () => {
        clearTimeout(timer);
        const q = input.value.trim();
        if (q.length < 2) { close(); return; }
        timer = setTimeout(async () => {
          const res = await fetch(`/admin/api/clientes?q=${encodeURIComponent(q)}&limit=6`);
          if (!res.ok) return;
          const { clientes } = await res.json();
          close();
          if (!clientes.length) return;
          dropEl = document.createElement('div');
          dropEl.className = 'ac-list';
          clientes.forEach(c => {
            const item = document.createElement('div');
            item.className = 'ac-item';
            item.innerHTML = `<span>${esc(c.nombre)}</span><span class="ac-tel">${c.telefono || ''}</span>`;
            item.addEventListener('mousedown', e => {
              e.preventDefault();
              input.value = c.nombre;
              if (telEl) telEl.value = c.telefono || '';
              close();
            });
            dropEl.appendChild(item);
          });
          input.closest('.ac-wrap').appendChild(dropEl);
        }, 300);
      });

      input.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
      document.addEventListener('click', e => {
        if (!input.closest('.ac-wrap')?.contains(e.target)) close();
      }, { capture: true });
    }

    // ── Utils ─────────────────────────────────────────────
    function getSelectedBarbero() {
      return role === 'owner' ? document.getElementById('barbero-select').value : sessionBarbero;
    }
    function formatFecha(d) { return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`; }
    function formatLabel(d) { return d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' }); }
    function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
    function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    init();
  </script>
