<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gebyanos — Agenda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0c0b09;
      --surface: #141210;
      --border:  #2a2620;
      --gold:    #c9a84c;
      --text:    #e8dcc8;
      --muted:   #6b6055;
      --font-serif: 'Playfair Display', serif;
      --font-mono:  'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; }

    /* NAV */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 56px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-brand { display: flex; align-items: center; gap: 0.75rem; }
    .nav-logo  { width: 32px; height: 32px; border-radius: 50%; }
    .nav-title { font-family: var(--font-serif); font-size: 1rem; }
    .nav-tabs  { display: flex; gap: 0.25rem; }
    .nav-tab {
      color: var(--muted); text-decoration: none;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.35rem 0.875rem; border-radius: 4px;
      transition: color 200ms, background 200ms;
    }
    .nav-tab:hover { color: var(--text); background: var(--border); }
    .nav-tab.active { color: var(--gold); background: rgba(201,168,76,0.08); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-user  { font-size: 0.8rem; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; }
    .nav-logout {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); font-family: var(--font-mono); font-size: 0.7rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.35rem 0.75rem; cursor: pointer; transition: color 200ms, border-color 200ms;
    }
    .nav-logout:hover { color: var(--text); border-color: var(--muted); }

    /* TOOLBAR */
    .toolbar {
      max-width: 720px; margin: 0 auto;
      padding: 1.75rem 1.5rem 0;
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
    }
    .date-label { font-family: var(--font-serif); font-size: 1.2rem; flex: 1; text-transform: capitalize; }
    .btn-icon {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-mono); font-size: 0.85rem;
      padding: 0.4rem 0.75rem; cursor: pointer; transition: border-color 200ms;
    }
    .btn-icon:hover { border-color: var(--muted); }
    .btn-today {
      color: var(--gold); border-color: var(--gold);
      font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .barbero-select {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-mono); font-size: 0.8rem;
      padding: 0.4rem 0.75rem; outline: none; cursor: pointer; transition: border-color 200ms;
      appearance: none;
    }
    .barbero-select:focus { border-color: var(--gold); }
    .barbero-select option { background: var(--surface); }

    /* MAIN */
    .main { max-width: 720px; margin: 0 auto; padding: 1.25rem 1.5rem 3rem; }

    /* SLOTS */
    .slots { display: flex; flex-direction: column; gap: 0.375rem; margin-top: 0.25rem; }

    .slot-row {
      display: grid;
      grid-template-columns: 58px 110px 1fr auto;
      align-items: center; gap: 1rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 1.125rem;
      transition: border-color 200ms;
    }
    .slot-row:hover { border-color: var(--muted); }
    .slot-row.reservado { border-color: rgba(201,168,76,0.25); }
    .slot-row.bloqueado { opacity: 0.5; }

    .slot-hora {
      font-size: 0.95rem; font-weight: 500; color: var(--gold);
    }
    .slot-badge {
      font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.2rem 0.6rem; border-radius: 20px;
      border: 1px solid currentColor;
    }
    .badge-libre    { color: #6dbf7e; }
    .badge-reservado{ color: var(--gold); }
    .badge-bloqueado{ color: var(--muted); }

    .slot-info { font-size: 0.85rem; color: var(--text); }
    .slot-info .servicio { color: var(--muted); font-size: 0.78rem; margin-left: 0.5rem; }

    .btn-bloquear {
      background: none; border: 1px solid var(--border); border-radius: 5px;
      color: var(--muted); font-family: var(--font-mono); font-size: 0.7rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.3rem 0.7rem; cursor: pointer; transition: all 200ms; white-space: nowrap;
    }
    .btn-bloquear:hover:not(:disabled) { color: #e57373; border-color: #e57373; }
    .btn-bloquear:disabled { opacity: 0.35; cursor: default; }
    .btn-bloquear.loading { opacity: 0.6; }

    .no-calendar-note {
      font-size: 0.7rem; color: var(--muted); text-align: right; white-space: nowrap;
    }

    .empty, .loading { text-align: center; color: var(--muted); font-size: 0.875rem; padding: 3rem 0; }

    @media (max-width: 540px) {
      .slot-row { grid-template-columns: 50px 90px 1fr; grid-template-rows: auto auto; }
      .slot-row > :last-child { grid-column: 1 / -1; }
      .nav-tabs { display: none; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-brand">
      <img src="/img/logo.jpg" alt="Gebyanos" class="nav-logo">
      <span class="nav-title">Gebyanos</span>
    </div>
    <div class="nav-tabs">
      <a href="/admin/dashboard" class="nav-tab">Reservas</a>
      <a href="/admin/agenda"    class="nav-tab active">Agenda</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="nav-logout" id="logout-btn">Salir</button>
    </div>
  </nav>

  <div class="toolbar">
    <button class="btn-icon" id="prev-btn">←</button>
    <span class="date-label" id="date-label"></span>
    <button class="btn-icon" id="next-btn">→</button>
    <button class="btn-icon btn-today" id="today-btn">Hoy</button>
    <select class="barbero-select" id="barbero-select" style="display:none">
      <option value="gebyano">Gebyano</option>
      <option value="lobo">Lobo</option>
      <option value="felipe">Felipe</option>
    </select>
  </div>

  <main class="main">
    <div id="content"><div class="loading">Cargando...</div></div>
  </main>

  <script>
    let role            = null;
    let sessionBarbero  = null;
    let currentDate     = new Date();
    let calendarConfig  = false;

    // ── Auth ──────────────────────────────────────────────
    async function init() {
      const res = await fetch('/admin/api/me');
      if (!res.ok) { location.href = '/admin/'; return; }
      const { barbero_id, role: r } = await res.json();
      role           = r;
      sessionBarbero = barbero_id;
      document.getElementById('nav-user').textContent = cap(barbero_id);

      const sel = document.getElementById('barbero-select');
      if (role === 'owner') {
        sel.style.display = 'block';
        sel.value = 'gebyano';
      }
      await load();
    }

    // ── Data ──────────────────────────────────────────────
    async function load() {
      document.getElementById('date-label').textContent = formatLabel(currentDate);
      document.getElementById('content').innerHTML = '<div class="loading">Cargando...</div>';

      const bId   = getSelectedBarbero();
      const fecha = formatFecha(currentDate);
      const params = new URLSearchParams({ fecha, barbero: bId });

      const res = await fetch(`/admin/api/agenda?${params}`);
      if (!res.ok) { location.href = '/admin/'; return; }

      const data = await res.json();
      calendarConfig = data.calendarConfigured;

      if (data.diaNoLaboral) {
        document.getElementById('content').innerHTML = '<p class="empty">Día no laborable.</p>';
        return;
      }
      render(data.slots, data.calendarConfigured);
    }

    function render(slots, hasCalendar) {
      if (!slots.length) {
        document.getElementById('content').innerHTML = '<p class="empty">Sin turnos para este día.</p>';
        return;
      }

      const rows = slots.map(s => {
        let badge, info, action;

        if (s.status === 'reservado') {
          badge  = `<span class="slot-badge badge-reservado">Reservado</span>`;
          info   = `<span class="slot-info">${s.nombre}<span class="servicio">${s.servicio}</span></span>`;
          action = '';
        } else if (s.status === 'bloqueado') {
          badge  = `<span class="slot-badge badge-bloqueado">Bloqueado</span>`;
          info   = `<span class="slot-info"></span>`;
          action = '';
        } else {
          badge  = `<span class="slot-badge badge-libre">Disponible</span>`;
          info   = `<span class="slot-info"></span>`;
          if (hasCalendar) {
            action = `<button class="btn-bloquear" data-hora="${s.hora}" onclick="bloquear(this)">Bloquear</button>`;
          } else {
            action = `<span class="no-calendar-note" title="Sin calendario configurado">Sin calendario</span>`;
          }
        }

        return `
          <div class="slot-row ${s.status}">
            <span class="slot-hora">${s.hora}</span>
            ${badge}
            ${info}
            <div>${action}</div>
          </div>`;
      }).join('');

      document.getElementById('content').innerHTML = `<div class="slots">${rows}</div>`;
    }

    // ── Bloquear ──────────────────────────────────────────
    async function bloquear(btn) {
      const hora = btn.dataset.hora;
      btn.classList.add('loading');
      btn.disabled = true;
      btn.textContent = '...';

      const res = await fetch('/admin/api/bloquear', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          barbero_id: getSelectedBarbero(),
          fecha: formatFecha(currentDate),
          hora,
        }),
      });

      if (res.ok) {
        await load(); // refrescar
      } else {
        const { error } = await res.json();
        alert(error || 'Error al bloquear');
        btn.classList.remove('loading');
        btn.disabled = false;
        btn.textContent = 'Bloquear';
      }
    }

    // ── Navegación ────────────────────────────────────────
    document.getElementById('prev-btn').addEventListener('click', () => { currentDate.setDate(currentDate.getDate() - 1); load(); });
    document.getElementById('next-btn').addEventListener('click', () => { currentDate.setDate(currentDate.getDate() + 1); load(); });
    document.getElementById('today-btn').addEventListener('click', () => { currentDate = new Date(); load(); });
    document.getElementById('barbero-select').addEventListener('change', load);

    // ── Logout ────────────────────────────────────────────
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/admin/api/auth', { method: 'DELETE' });
      location.href = '/admin/';
    });

    // ── Utils ─────────────────────────────────────────────
    function getSelectedBarbero() {
      return role === 'owner'
        ? document.getElementById('barbero-select').value
        : sessionBarbero;
    }
    function formatFecha(d) { return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`; }
    function formatLabel(d) { return d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' }); }
    function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    init();
  </script>

</body>
</html>
