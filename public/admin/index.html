<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gebyanos — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 2.5rem 2rem; width: 100%; max-width: 380px;
    }
    .logo { width: 72px; height: 72px; border-radius: 50%; display: block; margin: 0 auto 1.5rem; }
    h1   { font-family: var(--font-serif); font-size: 1.4rem; text-align: center; margin-bottom: 0.25rem; }
    .sub { text-align: center; color: var(--muted); font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2rem; }
    label { display: block; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    select, input[type="password"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-mono); font-size: 0.9rem;
      padding: 0.7rem 0.875rem; margin-bottom: 1.25rem; outline: none;
      transition: border-color 200ms; appearance: none;
    }
    select:focus, input:focus { border-color: var(--gold); }
    select option { background: var(--surface); }
    .btn {
      width: 100%; background: var(--gold); color: #0c0b09; border: none; border-radius: 6px;
      font-family: var(--font-mono); font-size: 0.8rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0.875rem; cursor: pointer; transition: opacity 200ms; margin-top: 0.25rem;
    }
    .btn:hover    { opacity: 0.85; }
    .btn:disabled { opacity: 0.45; cursor: default; }
    .error { color: #e57373; font-size: 0.8rem; text-align: center; margin-top: 0.875rem; min-height: 1em; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/img/logo.jpg" alt="Gebyanos" class="logo">
    <h1>Panel Admin</h1>
    <p class="sub">Barbería Gebyanos</p>

    <form id="form">
      <label for="barbero">Barbero</label>
      <select id="barbero" required>
        <option value="">Seleccioná tu usuario</option>
        <option value="gebyano">Gebyano</option>
        <option value="lobo">Lobo</option>
        <option value="felipe">Felipe</option>
      </select>

      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" required>

      <button type="submit" class="btn" id="btn">Ingresar</button>
      <p class="error" id="error"></p>
    </form>
  </div>

  <script>
    // Redirigir si ya hay sesión activa
    fetch('/admin/api/me').then(r => { if (r.ok) location.href = '/admin/dashboard'; });

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn   = document.getElementById('btn');
      const error = document.getElementById('error');
      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      error.textContent = '';

      const res = await fetch('/admin/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          barbero_id: document.getElementById('barbero').value,
          password:   document.getElementById('password').value,
        }),
      });

      if (res.ok) {
        location.href = '/admin/dashboard';
      } else {
        const { error: msg } = await res.json();
        error.textContent = msg || 'Error al ingresar';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
